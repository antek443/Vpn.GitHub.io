<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZeentxPL VPN | Global Panel</title>

    <style>
        :root {
            --primary: #ff4ecd;
            --secondary: #00d2ff;
            --discord: #5865F2;
            --bg-dark: #0a0a12;
            --glass: rgba(255, 255, 255, 0.08);
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            background: var(--bg-dark);
            height: 100%;
        }

        .bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(-45deg, #0f0c29, #1a1a2e, #24243e, #533483);
            background-size: 400% 400%;
            animation: gradient 15s infinite ease;
            z-index: -2;
        }

        @keyframes gradient {
            0% {background-position: 0% 50%}
            50% {background-position: 100% 50%}
            100% {background-position: 0% 50%}
        }

        /* Przełącznik języka */
        .lang-switcher {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 2000;
        }

        .lang-btn {
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 5px;
            font-size: 0.8rem;
            margin-left: 5px;
        }

        .lang-btn:hover { background: var(--primary); }

        /* LOGOWANIE */
        #login-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            background: var(--bg-dark);
            transition: 0.8s ease-in-out;
        }

        .login-box {
            background: var(--glass);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            width: 90%;
            max-width: 400px;
        }

        .login-box input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.3);
            color: white;
            box-sizing: border-box;
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            margin-top: 10px;
            border-radius: 12px;
            border: none;
            background: var(--primary);
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        /* GŁÓWNY PANEL */
        #main-content {
            display: none;
            opacity: 0;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .top-nav {
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(15px);
            padding: 15px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: center;
        }

        .dc-link {
            text-decoration: none;
            color: white;
            background: var(--discord);
            padding: 10px 30px;
            border-radius: 50px;
            font-weight: bold;
        }

        .container { width: 90%; max-width: 1000px; padding: 20px; }

        .box {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            padding: 30px;
            margin-top: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; margin-top: 20px; }

        .card {
            background: rgba(0, 0, 0, 0.4);
            padding: 15px;
            border-radius: 15px;
            cursor: pointer;
            text-align: center;
            border: 1px solid transparent;
            transition: 0.3s;
        }

        .card:hover { transform: scale(1.05); border-color: var(--primary); }

        /* MODAL */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            backdrop-filter: blur(10px);
        }

        .modal {
            background: #16213e;
            padding: 40px;
            border-radius: 30px;
            border: 2px solid var(--primary);
            text-align: center;
            width: 80%;
            max-width: 350px;
        }

        #m-ip { font-size: 1.8rem; color: var(--secondary); margin: 20px 0; font-family: monospace; }
    </style>
</head>
<body>

    <div class="bg"></div>

    <div class="lang-switcher">
        <button class="lang-btn" onclick="setLang('pl')">PL 🇵🇱</button>
        <button class="lang-btn" onclick="setLang('en')">EN 🇬🇧</button>
    </div>

    <div id="login-screen">
        <div class="login-box">
            <h2 id="l-title">🔐 ZeentxPL LOGIN</h2>
            <input type="text" id="username" placeholder="Użytkownik / Username">
            <input type="password" id="password" placeholder="Hasło / Password">
            <button class="login-btn" id="l-btn" onclick="checkLogin()">ZALOGUJ SIĘ</button>
            <p id="l-error" style="color: #ff4444; display: none; margin-top: 10px;">Błędne dane!</p>
        </div>
    </div>

    <div id="main-content">
        <div class="top-nav">
            <a href="https://discord.com/invite/bHeSDzrrjR" target="_blank" class="dc-link" id="nav-dc">💬 DISCORD</a>
        </div>

        <div class="container">
            <h1 id="main-title" style="text-align:center; font-size: 2.5rem; margin-top: 30px;">ZeentxPL VPN</h1>

            <div class="box">
                <h2 id="s1-title">Witaj w Panelu Premium</h2>
                <p id="s1-status">Status subskrypcji: <span style="color: #00ff88;">AKTYWNA</span></p>
                <div class="grid" id="grid"></div>
            </div>
            
            <div class="box">
                <h2 id="s2-title">🛡️ Ochrona</h2>
                <p id="s2-desc">Wszystkie połączenia są szyfrowane metodą AES-256.</p>
            </div>
        </div>
    </div>

    <div class="overlay" id="overlay" onclick="closeModal(event)">
        <div class="modal">
            <h2 id="m-title">KRAJ</h2>
            <div id="m-ip">0.0.0.0</div>
            <button class="login-btn" id="m-copy" onclick="copyIP()">📋 SKOPIUJ IP</button>
        </div>
    </div>

    <script>
        let currentLang = 'pl';
        const translations = {
            pl: {
                lTitle: "🔐 ZeentxPL LOGOWANIE",
                lBtn: "ZALOGUJ SIĘ",
                lError: "Błędne dane logowania!",
                navDc: "💬 DISCORD",
                mainTitle: "ZeentxPL VPN",
                s1Title: "Witaj w Panelu Premium",
                s1Status: "Status subskrypcji: ",
                s1Active: "AKTYWNA",
                s2Title: "🛡️ Ochrona",
                s2Desc: "Wszystkie połączenia są szyfrowane metodą AES-256.",
                mCopy: "📋 SKOPIUJ IP",
                mSuccess: "✅ SKOPIOWANO!"
            },
            en: {
                lTitle: "🔐 ZeentxPL LOGIN",
                lBtn: "LOGIN NOW",
                lError: "Invalid login credentials!",
                navDc: "💬 DISCORD",
                mainTitle: "ZeentxPL VPN",
                s1Title: "Welcome to Premium Panel",
                s1Status: "Subscription status: ",
                s1Active: "ACTIVE",
                s2Title: "🛡️ Protection",
                s2Desc: "All connections are encrypted with AES-256.",
                mCopy: "📋 COPY IP",
                mSuccess: "✅ COPIED!"
            }
        };

        function setLang(lang) {
            currentLang = lang;
            const t = translations[lang];
            document.getElementById('l-title').innerText = t.lTitle;
            document.getElementById('l-btn').innerText = t.lBtn;
            document.getElementById('l-error').innerText = t.lError;
            document.getElementById('nav-dc').innerText = t.navDc;
            document.getElementById('main-title').innerText = t.mainTitle;
            document.getElementById('s1-title').innerText = t.s1Title;
            document.getElementById('s1-status').innerHTML = `${t.s1Status} <span style="color: #00ff88;">${t.s1Active}</span>`;
            document.getElementById('s2-title').innerText = t.s2Title;
            document.getElementById('s2-desc').innerText = t.s2Desc;
            document.getElementById('m-copy').innerText = t.mCopy;
        }

        function checkLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            if(user === "admin" && pass === "admin") {
                document.getElementById('login-screen').style.transform = "translateY(-100%)";
                setTimeout(() => {
                    document.getElementById('login-screen').style.display = "none";
                    document.getElementById('main-content').style.display = "flex";
                    setTimeout(() => document.getElementById('main-content').style.opacity = "1", 50);
                }, 800);
            } else {
                document.getElementById('l-error').style.display = "block";
            }
        }

        const kraje = [
            {n: 'Polska', f: '🇵🇱'}, {n: 'USA', f: '🇺🇸'}, {n: 'Niemcy', f: '🇩🇪'}, {n: 'Japonia', f: '🇯🇵'},
            {n: 'UK', f: '🇬🇧'}, {n: 'Kanada', f: '🇨🇦'}, {n: 'Francja', f: '🇫🇷'}, {n: 'Brazylia', f: '🇧🇷'},
            {n: 'Holandia', f: '🇳🇱'}, {n: 'Szwajcaria', f: '🇨🇭'}, {n: 'Australia', f: '🇦🇺'}, {n: 'Włochy', f: '🇮🇹'},
            {n: 'Norwegia', f: '🇳🇴'}, {n: 'Hiszpania', f: '🇪🇸'}, {n: 'Szwecja', f: '🇸🇪'}, {n: 'Singapur', f: '🇸🇬'},
            {n: 'Korea', f: '🇰🇷'}, {n: 'Turcja', f: '🇹🇷'}, {n: 'Meksyk', f: '🇲🇽'}, {n: 'Indie', f: '🇮🇳'}
        ];

        const grid = document.getElementById('grid');
        let currentIP = "";

        kraje.forEach(k => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<div style="font-size:2rem">${k.f}</div><b>${k.n}</b>`;
            card.onclick = () => openModal(k.n, k.f);
            grid.appendChild(card);
        });

        function openModal(name, flag) {
            currentIP = `${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}`;
            document.getElementById('m-title').innerText = `${flag} ${name}`;
            document.getElementById('m-ip').innerText = currentIP;
            document.getElementById('overlay').style.display = 'flex';
        }

        function closeModal(e) { if (e.target.id === 'overlay') document.getElementById('overlay').style.display = 'none'; }

        function copyIP() {
            navigator.clipboard.writeText(currentIP);
            const btn = document.getElementById('m-copy');
            const original = btn.innerText;
            btn.innerText = translations[currentLang].mSuccess;
            setTimeout(() => btn.innerText = translations[currentLang].mCopy, 2000);
        }
    </script>
</body>
</html>
