<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZeentxPL VPN | Global Network</title>
    <style>
        :root {
            --primary: #ff4ecd;
            --secondary: #00d2ff;
            --discord: #5865F2;
            --admin-color: #ff4444;
            --bg-dark: #0a0a12;
            --glass: rgba(255, 255, 255, 0.08);
        }

        body, html {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', sans-serif;
            color: white; background: var(--bg-dark);
            min-height: 100vh; overflow-x: hidden;
        }

        .bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(-45deg, #0f0c29, #1a1a2e, #24243e, #533483);
            background-size: 400% 400%; animation: gradient 15s infinite ease; z-index: -2;
        }
        @keyframes gradient { 0% {background-position: 0% 50%} 50% {background-position: 100% 50%} 100% {background-position: 0% 50%} }

        /* Języki */
        .lang-switcher { position: fixed; top: 20px; right: 20px; z-index: 3000; }
        .lang-btn { background: var(--glass); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 8px 12px; cursor: pointer; border-radius: 8px; font-weight: bold; margin-left: 5px; }

        /* AUTH SCREEN */
        #auth-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            z-index: 2000; background: var(--bg-dark); transition: 0.8s ease-in-out;
        }
        .auth-box {
            background: var(--glass); backdrop-filter: blur(25px);
            padding: 40px; border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center; width: 90%; max-width: 450px;
        }
        input {
            width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.5); color: white; box-sizing: border-box; font-size: 1rem;
        }
        .btn {
            width: 100%; padding: 15px; margin-top: 10px; border-radius: 12px;
            border: none; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 1rem;
        }
        .btn-user { background: var(--primary); color: white; }
        .btn-admin { background: transparent; color: var(--admin-color); border: 2px solid var(--admin-color); margin-top: 15px; }
        .btn-reg { background: transparent; color: var(--secondary); border: 1px solid var(--secondary); margin-top: 5px; }
        .btn:hover { transform: scale(1.02); filter: brightness(1.2); }

        /* MAIN CONTENT */
        #main-content { display: none; opacity: 0; flex-direction: column; align-items: center; width: 100%; padding-bottom: 50px; }
        .top-nav { width: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(15px); padding: 15px 0; display: flex; justify-content: center; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--glass); }
        .container { width: 90%; max-width: 1200px; }
        .box { background: var(--glass); backdrop-filter: blur(20px); border-radius: 25px; padding: 30px; margin-top: 30px; border: 1px solid rgba(255,255,255,0.1); }
        
        /* GRID KRAJUW */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; margin-top: 25px; }
        .card { background: rgba(0,0,0,0.4); padding: 20px; border-radius: 20px; text-align: center; cursor: pointer; transition: 0.3s; border: 1px solid rgba(255,255,255,0.05); }
        .card:hover { transform: translateY(-8px); background: var(--primary); border-color: white; }

        /* ADMIN PANEL */
        #admin-panel { display: none; margin-top: 40px; border: 2px solid var(--admin-color); background: rgba(255,0,0,0.05); }
        .user-row { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: rgba(0,0,0,0.3); margin-top: 10px; border-radius: 12px; }
        .reset-btn { background: var(--admin-color); color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        /* MODAL */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 3000; }
        .modal { background: #16213e; padding: 40px; border-radius: 35px; border: 2px solid var(--primary); text-align: center; width: 85%; max-width: 400px; }
    </style>
</head>
<body>

<div class="bg"></div>

<div class="lang-switcher">
    <button class="lang-btn" onclick="setLang('pl')">PL 🇵🇱</button>
    <button class="lang-btn" onclick="setLang('en')">EN 🇬🇧</button>
</div>

<div id="auth-screen">
    <div class="auth-box">
        <h2 id="auth-title">🌍 ZeentxPL VPN</h2>
        <p id="auth-subtitle">Zaloguj się, aby uzyskać dostęp</p>
        
        <input type="text" id="auth-user" placeholder="Nazwa użytkownika">
        <input type="password" id="auth-pass" placeholder="Hasło">
        
        <button class="btn btn-user" id="btn-login" onclick="handleAuth('user')">ZALOGUJ SIĘ</button>
        <button class="btn btn-reg" id="btn-reg" onclick="handleAuth('reg')">UTWÓRZ KONTO</button>
        <button class="btn btn-admin" id="btn-admin-mode" onclick="handleAuth('admin')">🔐 LOGOWANIE ADMIN</button>
        
        <p id="auth-error" style="color: #ff4444; display: none; margin-top: 15px; font-weight: bold;"></p>
    </div>
</div>

<div id="main-content">
    <div class="top-nav">
        <a href="https://discord.com/invite/bHeSDzrrjR" target="_blank" style="text-decoration:none; color:white; background:var(--discord); padding:12px 30px; border-radius:50px; font-weight:bold; box-shadow: 0 4px 15px rgba(88, 101, 242, 0.4);">💬 DISCORD SERVER</a>
    </div>

    <div class="container">
        <h1 style="text-align:center; font-size: 3.5rem; margin: 40px 0; text-shadow: 0 0 20px var(--primary);">ZeentxPL VPN</h1>
        
        <div class="box">
            <h2 id="welcome-txt">Witaj w Panelu</h2>
            <p id="sub-status">Status subskrypcji: <span style="color: #00ff88; font-weight: bold;">AKTYWNA (PREMIUM)</span></p>
            <div class="grid" id="grid"></div>
        </div>

        <div class="box" id="admin-panel">
            <h2 style="color: var(--admin-color)">👑 PANEL ZARZĄDZANIA ADMINA</h2>
            <div id="user-list"></div>
        </div>
    </div>
</div>

<div class="overlay" id="overlay" onclick="if(event.target.id=='overlay') this.style.display='none'">
    <div class="modal">
        <h2 id="m-title">KRAJ</h2>
        <p>Twoje bezpieczne IP:</p>
        <div id="m-ip" style="font-size: 2.2rem; color: var(--secondary); margin: 25px 0; font-family: monospace; letter-spacing: 2px;">0.0.0.0</div>
        <button class="btn btn-user" id="m-copy-btn" onclick="copyIP()">📋 SKOPIUJ IP</button>
    </div>
</div>

<script>
    let currentLang = 'pl';
    let users = JSON.parse(localStorage.getItem('vpn_users')) || { "admin": "123456" };
    let loggedUser = "";

    const translations = {
        pl: {
            authTitle: "🌍 ZeentxPL VPN",
            loginBtn: "ZALOGUJ SIĘ",
            regBtn: "UTWÓRZ KONTO",
            adminBtn: "🔐 LOGOWANIE ADMIN",
            errorAuth: "Błędne dane logowania!",
            errorExists: "Użytkownik już istnieje!",
            errorAdmin: "To nie jest konto administratora!",
            welcome: "Witaj w Panelu Premium, ",
            copyBtn: "📋 SKOPIUJ IP",
            copied: "✅ SKOPIOWANO!",
            adminReset: "RESETUJ HASŁO"
        },
        en: {
            authTitle: "🌍 ZeentxPL VPN",
            loginBtn: "USER LOGIN",
            regBtn: "CREATE ACCOUNT",
            adminBtn: "🔐 ADMIN LOGIN",
            errorAuth: "Invalid username or password!",
            errorExists: "User already exists!",
            errorAdmin: "This is not an admin account!",
            welcome: "Welcome to Premium Panel, ",
            copyBtn: "📋 COPY IP",
            copied: "✅ COPIED!",
            adminReset: "RESET PASSWORD"
        }
    };

    function setLang(lang) {
        currentLang = lang;
        const t = translations[lang];
        document.getElementById('btn-login').innerText = t.loginBtn;
        document.getElementById('btn-reg').innerText = t.regBtn;
        document.getElementById('btn-admin-mode').innerText = t.adminBtn;
        document.getElementById('m-copy-btn').innerText = t.copyBtn;
    }

    function handleAuth(mode) {
        const u = document.getElementById('auth-user').value;
        const p = document.getElementById('auth-pass').value;
        const err = document.getElementById('auth-error');
        err.style.display = "none";

        if (!u || !p) { alert("Wypełnij wszystkie pola!"); return; }

        if (mode === 'reg') {
            if (users[u]) {
                err.innerText = translations[currentLang].errorExists;
                err.style.display = "block";
            } else {
                users[u] = p;
                localStorage.setItem('vpn_users', JSON.stringify(users));
                alert("Konto utworzone! Możesz się teraz zalogować.");
            }
        } else if (mode === 'user') {
            if (users[u] && users[u] === p) {
                loginSuccess(u);
            } else {
                err.innerText = translations[currentLang].errorAuth;
                err.style.display = "block";
            }
        } else if (mode === 'admin') {
            if (u === "admin" && p === "123456") {
                loginSuccess(u);
            } else {
                err.innerText = translations[currentLang].errorAdmin;
                err.style.display = "block";
            }
        }
    }

    function loginSuccess(u) {
        loggedUser = u;
        document.getElementById('auth-screen').style.transform = "translateY(-100%)";
        setTimeout(() => {
            document.getElementById('auth-screen').style.display = "none";
            document.getElementById('main-content').style.display = "flex";
            document.getElementById('welcome-txt').innerText = translations[currentLang].welcome + u;
            setTimeout(() => document.getElementById('main-content').style.opacity = "1", 50);
            if(u === "admin") showAdminPanel();
        }, 800);
    }

    function showAdminPanel() {
        document.getElementById('admin-panel').style.display = "block";
        const list = document.getElementById('user-list');
        list.innerHTML = "";
        for (let u in users) {
            if(u === 'admin') continue;
            const div = document.createElement('div');
            div.className = "user-row";
            div.innerHTML = `<span>👤 <b>${u}</b> (Hasło: ${users[u]})</span> 
                             <button class="reset-btn" onclick="resetUser('${u}')">${translations[currentLang].adminReset}</button>`;
            list.appendChild(div);
        }
    }

    function resetUser(u) {
        users[u] = "123456";
        localStorage.setItem('vpn_users', JSON.stringify(users));
        showAdminPanel();
        alert("Zresetowano hasło dla " + u + " na: 123456");
    }

    // 50 KRAJÓW
    const kraje = [
        {n: 'Polska', f: '🇵🇱'}, {n: 'USA', f: '🇺🇸'}, {n: 'Niemcy', f: '🇩🇪'}, {n: 'UK', f: '🇬🇧'},
        {n: 'Japonia', f: '🇯🇵'}, {n: 'Francja', f: '🇫🇷'}, {n: 'Brazylia', f: '🇧🇷'}, {n: 'Kanada', f: '🇨🇦'},
        {n: 'Szwecja', f: '🇸🇪'}, {n: 'Norwegia', f: '🇳🇴'}, {n: 'Włochy', f: '🇮🇹'}, {n: 'Korea', f: '🇰🇷'},
        {n: 'Australia', f: '🇦🇺'}, {n: 'Holandia', f: '🇳🇱'}, {n: 'Szwajcaria', f: '🇨🇭'}, {n: 'Hiszpania', f: '🇪🇸'},
        {n: 'Meksyk', f: '🇲🇽'}, {n: 'Indie', f: '🇮🇳'}, {n: 'Turcja', f: '🇹🇷'}, {n: 'Egipt', f: '🇪🇬'},
        {n: 'Portugalia', f: '🇵🇹'}, {n: 'Grecja', f: '🇬🇷'}, {n: 'Belgia', f: '🇧🇪'}, {n: 'Austria', f: '🇦🇹'},
        {n: 'Finlandia', f: '🇫🇮'}, {n: 'Dania', f: '🇩🇰'}, {n: 'Czechy', f: '🇨🇿'}, {n: 'Węgry', f: '🇭🇺'},
        {n: 'Ukraina', f: '🇺🇦'}, {n: 'Irlandia', f: '🇮🇪'}, {n: 'Izrael', f: '🇮🇱'}, {n: 'ZEA', f: '🇦🇪'},
        {n: 'Singapur', f: '🇸🇬'}, {n: 'Tajlandia', f: '🇹🇭'}, {n: 'RPA', f: '🇿🇦'}, {n: 'Argentyna', f: '🇦🇷'},
        {n: 'Chile', f: '🇨🇱'}, {n: 'Islandia', f: '🇮🇸'}, {n: 'Rumunia', f: '🇷🇴'}, {n: 'Chorwacja', f: '🇭🇷'},
        {n: 'Nowa Zelandia', f: '🇳🇿'}, {n: 'Wietnam', f: '🇻🇳'}, {n: 'Filipiny', f: '🇵🇭'}, {n: 'Malezja', f: '🇲🇾'},
        {n: 'Kolumbia', f: '🇨🇴'}, {n: 'Peru', f: '🇵🇪'}, {n: 'Maroko', f: '🇲🇦'}, {n: 'Bułgaria', f: '🇧🇬'},
        {n: 'Słowacja', f: '🇸🇰'}, {n: 'Estonia', f: '🇪🇪'}
    ];

    const grid = document.getElementById('grid');
    kraje.forEach(k => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `<div style="font-size:2.5rem; margin-bottom:5px;">${k.f}</div><b>${k.n}</b>`;
        card.onclick = () => {
            const ip = `${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}`;
            document.getElementById('m-title').innerText = k.f + " " + k.n;
            document.getElementById('m-ip').innerText = ip;
            document.getElementById('overlay').style.display = "flex";
        };
        grid.appendChild(card);
    });

    function copyIP() {
        const ip = document.getElementById('m-ip').innerText;
        navigator.clipboard.writeText(ip);
        const btn = document.getElementById('m-copy-btn');
        btn.innerText = translations[currentLang].copied;
        setTimeout(() => btn.innerText = translations[currentLang].copyBtn, 1500);
    }
</script>
</body>
</html>
