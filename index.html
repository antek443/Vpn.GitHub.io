<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZeentxPL VPN | PRO Dashboard</title>

    <style>
        :root {
            --accent: #ff4ecd;
            --neon-blue: #00d2ff;
            --success: #00ff88;
            --glass: rgba(255, 255, 255, 0.07);
        }

        body {
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            background: #050505;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Animowane tło */
        .bg-animate {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(45deg, #0f0c29, #302b63, #24243e);
            z-index: -1;
        }

        h1 {
            font-size: 3rem;
            margin: 20px 0;
            text-shadow: 0 0 15px var(--accent);
            letter-spacing: 2px;
        }

        .container {
            width: 100%;
            max-width: 1000px;
        }

        .box {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            padding: 25px;
            margin-bottom: 25px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Mocniejszy efekt podnoszenia */
        .box:hover {
            transform: translateY(-12px) scale(1.01);
            border-color: var(--neon-blue);
            box-shadow: 0 15px 45px rgba(0, 210, 255, 0.2);
        }

        /* Siatka krajów - 20 pozycji */
        .country-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
            margin-top: 20px;
        }

        .country-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 15px;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid transparent;
            text-align: center;
        }

        .country-card:hover {
            background: rgba(255, 78, 205, 0.2);
            border-color: var(--accent);
            transform: scale(1.05);
        }

        .flag { font-size: 1.8rem; display: block; margin-bottom: 5px; }

        /* Powiadomienie o kopiowaniu */
        #toast {
            visibility: hidden;
            min-width: 250px;
            background-color: var(--success);
            color: #000;
            text-align: center;
            border-radius: 10px;
            padding: 16px;
            position: fixed;
            z-index: 100;
            bottom: 30px;
            font-weight: bold;
            box-shadow: 0 0 20px var(--success);
        }

        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }

        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }

        #vpn-info {
            font-size: 1.2rem;
            color: var(--success);
            margin: 10px 0;
            min-height: 1.5em;
        }

        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover { filter: brightness(1.2); transform: scale(1.05); }
    </style>
</head>
<body>

    <div class="bg-animate"></div>
    <div id="toast">📋 IP skopiowane do schowka!</div>

    <div class="container">
        <h1>⚡ ZeentxPL VPN</h1>

        <div class="box">
            <h2>🛡️ Twoje bazowe IP</h2>
            <p id="ip-real">Kliknij przycisk poniżej</p>
            <button onclick="getRealIP()">POBIERZ MOJE IP</button>
        </div>

        <div class="box">
            <h2>🌍 Serwery Premium (Kliknij aby skopiować IP)</h2>
            <div id="vpn-info">Wybierz serwer z listy:</div>
            
            <div class="country-grid" id="grid">
                </div>
        </div>
    </div>

    <script>
        const kraje = [
            {n: 'Polska', f: '🇵🇱'}, {n: 'USA', f: '🇺🇸'}, {n: 'Niemcy', f: '🇩🇪'}, {n: 'Japonia', f: '🇯🇵'},
            {n: 'UK', f: '🇬🇧'}, {n: 'Kanada', f: '🇨🇦'}, {n: 'Francja', f: '🇫🇷'}, {n: 'Brazylia', f: '🇧🇷'},
            {n: 'Holandia', f: '🇳🇱'}, {n: 'Szwajcaria', f: '🇨🇭'}, {n: 'Australia', f: '🇦🇺'}, {n: 'Włochy', f: '🇮🇹'},
            {n: 'Norwegia', f: '🇳🇴'}, {n: 'Hiszpania', f: '🇪🇸'}, {n: 'Szwecja', f: '🇸🇪'}, {n: 'Singapur', f: '🇸🇬'},
            {n: 'Islandia', f: '🇮🇸'}, {n: 'Meksyk', f: '🇲🇽'}, {n: 'Indie', f: '🇮🇳'}, {n: 'Korea Płd.', f: '🇰🇷'}
        ];

        // Generowanie siatki
        const grid = document.getElementById('grid');
        kraje.forEach(k => {
            const div = document.createElement('div');
            div.className = 'country-card';
            div.innerHTML = `<span class="flag">${k.f}</span><span>${k.n}</span>`;
            div.onclick = () => connectVPN(k.n, k.f);
            grid.appendChild(div);
        });

        async function getRealIP() {
            document.getElementById('ip-real').innerText = "Pobieranie...";
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                document.getElementById('ip-real').innerText = data.ip;
            } catch { document.getElementById('ip-real').innerText = "Błąd połączenia"; }
        }

        function connectVPN(nazwa, flaga) {
            const fakeIP = `${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}`;
            
            // Aktualizacja tekstu
            document.getElementById('vpn-info').innerHTML = `Połączono: ${flaga} <b>${nazwa}</b> | IP: <span id="target-ip">${fakeIP}</span>`;
            
            // KOPIOWANIE DO SCHOWKA
            navigator.clipboard.writeText(fakeIP).then(() => {
                showToast();
            });
        }

        function showToast() {
            const t = document.getElementById('toast');
            t.className = "show";
            setTimeout(() => { t.className = t.className.replace("show", ""); }, 3000);
        }
    </script>

</body>
</html>
