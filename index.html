<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Słowo - Gigantyczna Baza Słów</title>
    <style>
        :root {
            --bg-color: #121213;
            --tile-border: #3a3a3c;
            --tile-empty: #121213;
            --color-correct: #6aaa64;
            --color-present: #c9b458;
            --color-absent: #3a3a3c;
            --key-bg: #818384;
            --text-color: #f8f9fa;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
            overflow: hidden;
        }

        header {
            border-bottom: 1px solid var(--tile-border);
            width: 100%;
            max-width: 500px;
            text-align: center;
            padding-bottom: 5px;
            margin-bottom: 10px;
        }

        h1 {
            margin: 0;
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: 3px;
            background: linear-gradient(45deg, #6aaa64, #c9b458);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
            width: 100%;
        }

        #grid {
            display: grid;
            grid-template-rows: repeat(6, 1fr);
            gap: 5px;
            margin-bottom: 15px;
        }

        .row {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 5px;
        }

        .row.shake { animation: shake 0.5s ease-in-out; }

        .tile {
            width: 52px;
            height: 52px;
            border: 2px solid var(--tile-border);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.6rem;
            font-weight: bold;
            text-transform: uppercase;
            user-select: none;
            transition: transform 0.1s ease, background-color 0.3s ease;
            border-radius: 4px;
        }

        .tile.pop {
            transform: scale(1.08);
            border-color: #565758;
        }

        .correct { background-color: var(--color-correct) !important; border-color: var(--color-correct) !important; }
        .present { background-color: var(--color-present) !important; border-color: var(--color-present) !important; }
        .absent { background-color: var(--color-absent) !important; border-color: var(--color-absent) !important; }

        #keyboard {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-top: 10px;
            padding-bottom: 10px;
        }

        .keyboard-row {
            display: flex;
            justify-content: center;
            gap: 4px;
            width: 100%;
        }

        .key {
            background-color: var(--key-bg);
            color: white;
            border: 0;
            border-radius: 4px;
            height: 48px;
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 0.95rem;
            cursor: pointer;
            user-select: none;
            text-transform: uppercase;
            transition: background-color 0.2s ease;
        }

        .key.wide { flex: 1.5; font-size: 0.8rem; }

        #toast-container {
            position: fixed;
            top: 12%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }

        .toast {
            background-color: #f8f9fa;
            color: #121213;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            margin-bottom: 8px;
            opacity: 0;
            transition: opacity 0.15s ease;
        }
        .toast.show { opacity: 1; }

        #modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal-content {
            background-color: #1c1c1e;
            padding: 25px;
            border-radius: 14px;
            text-align: center;
            max-width: 360px;
            width: 85%;
            border: 1px solid var(--tile-border);
        }

        .secret-word-display {
            font-size: 2rem;
            letter-spacing: 3px;
            color: var(--color-correct);
            font-weight: 900;
            margin: 15px 0;
        }

        .btn-restart {
            background-color: var(--color-correct);
            color: white;
            border: none;
            padding: 10px 24px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px); }
            40%, 80% { transform: translateX(6px); }
        }
    </style>
</head>
