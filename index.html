<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEENTX | OMNI HUB V9</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&family=JetBrains+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent: #00ffa3;
            --accent-glow: rgba(0, 255, 163, 0.3);
            --bg: #050507;
            --card-bg: rgba(255, 255, 255, 0.02);
            --border: rgba(255, 255, 255, 0.06);
            --text: #ffffff;
            --ease-ventura: cubic-bezier(0.2, 1, 0.2, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body { 
            background: var(--bg); color: var(--text); 
            font-family: 'Outfit', sans-serif; overflow: hidden; height: 100vh;
        }

        /* --- BACKGROUND --- */
        .bg-mesh {
            position: fixed; inset: 0; z-index: -1;
            background-image: radial-gradient(circle at 50% -20%, #1a2a24 0%, transparent 50%);
        }

        /* --- ALERTY --- */
        #alert-stack {
            position: fixed; top: 30px; right: 30px; z-index: 10000;
            display: flex; flex-direction: column; gap: 10px;
        }
        .v-alert {
            background: rgba(10, 15, 12, 0.95); border: 1px solid var(--border);
            border-left: 4px solid var(--accent); padding: 18px 25px; border-radius: 12px;
            backdrop-filter: blur(20px); transform: translateX(150%);
            transition: 0.6s var(--ease-ventura); box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .v-alert.active { transform: translateX(0); }

        /* --- LOGIN SCREEN --- */
        #login-screen {
            position: fixed; inset: 0; z-index: 9999; background: var(--bg);
            display: flex; justify-content: center; align-items: center; transition: 1s var(--ease-ventura);
        }
        .login-card {
            width: 420px; padding: 60px; background: var(--card-bg);
            border: 1px solid var(--border); border-radius: 40px; text-align: center;
            backdrop-filter: blur(40px);
        }
        .login-card input {
            width: 100%; padding: 18px; margin: 15px 0; background: rgba(0,0,0,0.3);
            border: 1px solid var(--border); border-radius: 15px; color: white;
        }
        .btn-enter {
            width: 100%; padding: 20px; background: var(--accent); color: black;
            border: none; border-radius: 18px; font-weight: 900; cursor: pointer;
            text-transform: uppercase; letter-spacing: 2px; margin-top: 10px;
        }

        /* --- MAIN LAYOUT --- */
        #app-container { display: none; grid-template-columns: 280px 1fr 320px; height: 100vh; }

        /* Sidebar */
        .sidebar { border-right: 1px solid var(--border); padding: 40px 25px; }
        .nav-link {
            padding: 16px; margin-bottom: 10px; border-radius: 15px; cursor: pointer;
            display: flex; align-items: center; gap: 15px; color: rgba(255,255,255,0.4);
            transition: 0.3s;
        }
        .nav-link:hover {
            background: rgba(255,255,255,0.03); color: var(--accent);
            transform: translateX(8px);
        }
        .nav-link.active { background: var(--accent); color: black; font-weight: 900; }

        /* Content Area */
        .main-view { padding: 40px; overflow-y: auto; scroll-behavior: smooth; }

        /* ONLINE SECTION (4 GIERKI) */
        .online-row {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 60px;
        }
        .online-card {
            height: 180px; background: linear-gradient(135deg, rgba(0,255,163,0.1) 0%, rgba(0,0,0,0) 100%);
            border: 1px solid var(--accent); border-radius: 25px; position: relative;
            cursor: pointer; overflow: hidden; display: flex; flex-direction: column;
            justify-content: center; align-items: center; transition: 0.5s var(--ease-ventura);
        }
        .online-card:hover {
            transform: translateY(-15px);
            box-shadow: 0 25px 50px rgba(0, 255, 163, 0.2);
            background: var(--accent); color: black;
        }
        .online-card i { font-size: 2.5rem; margin-bottom: 10px; }

        /* MINI GAMES GRID (150 GIER) */
        .mini-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px;
        }
        .mini-card {
            background: var(--card-bg); border: 1px solid var(--border);
            padding: 25px; border-radius: 25px; cursor: pointer;
            transition: 0.5s var(--ease-ventura); text-align: center;
        }
        .mini-card:hover {
            transform: translateY(-20px) scale(1.03);
            border-color: var(--accent);
            box-shadow: 0 30px 60px rgba(0,0,0,0.5), 0 0 20px var(--accent-glow);
        }
        .mini-card h4 { font-size: 0.9rem; margin-bottom: 5px; }
        .mini-card .ip-label { font-family: 'JetBrains Mono'; font-size: 0.7rem; color: var(--accent); opacity: 0.7; }

        /* Social Sidebar */
        .social-sidebar { border-left: 1px solid var(--border); padding: 40px 25px; }
        .profile-box {
            background: rgba(255,255,255,0.02); padding: 25px; border-radius: 25px; margin-bottom: 40px;
            text-align: center;
        }
        .avatar {
            width: 80px; height: 80px; background: var(--accent); border-radius: 25px;
            margin: 0 auto 15px; display: flex; align-items: center; justify-content: center;
            font-size: 2rem; color: black; font-weight: 900;
        }

    </style>
</head>
<body>

    <div class="bg-mesh"></div>
    <div id="alert-stack"></div>

    <div id="login-screen">
        <div class="login-card">
            <h1 style="font-weight: 900; letter-spacing: -2px; margin-bottom: 10px;">ZEENTX<span style="color:var(--accent)">.HUB</span></h1>
            <p style="color: gray; margin-bottom: 30px;">Zarejestruj profil w systemie OMNI</p>
            <input type="text" id="user-input" placeholder="Wybierz Nick">
            <input type="password" placeholder="Hasło dostępu">
            <button class="btn-enter" onclick="bootSystem()">Inicjalizacja</button>
        </div>
    </div>

    <div id="app-container">
        <aside class="sidebar">
            <div style="font-weight: 900; font-size: 1.4rem; margin-bottom: 60px;">VENTURA CLIENT</div>
            <nav>
                <div class="nav-link active"><i class="fas fa-th-large"></i> Dashboard</div>
                <div class="nav-link"><i class="fas fa-gamepad"></i> Gry Mini (150)</div>
                <div class="nav-link"><i class="fas fa-globe"></i> Gry Online (4)</div>
                <div class="nav-link"><i class="fas fa-cog"></i> Konfiguracja</div>
            </nav>
        </aside>

        <main class="main-view">
            <h2 style="margin-bottom: 25px; font-weight: 900;">LIVE <span style="color:var(--accent)">ONLINE</span></h2>
            <div class="online-row">
                <div class="online-card" onclick="copyIP('144.20.10.1:25565', 'Multi-Arena 1')">
                    <i class="fas fa-users"></i>
                    <b>ARENA 1v1</b>
                </div>
                <div class="online-card" onclick="copyIP('144.20.10.2:25565', 'Survival Online')">
                    <i class="fas fa-fire"></i>
                    <b>SURVIVAL</b>
                </div>
                <div class="online-card" onclick="copyIP('144.20.10.3:25565', 'Battle Royale')">
                    <i class="fas fa-crosshairs"></i>
                    <b>ROYALE</b>
                </div>
                <div class="online-card" onclick="copyIP('144.20.10.4:25565', 'Creative Mode')">
                    <i class="fas fa-paint-brush"></i>
                    <b>CREATIVE</b>
                </div>
            </div>

            <h2 style="margin-bottom: 25px; font-weight: 900;">BIBLIOTEKA <span style="color:var(--accent)">MINI-GAMES</span></h2>
            <div class="mini-grid" id="mini-container">
                </div>
        </main>

        <aside class="social-sidebar">
            <div class="profile-box">
                <div class="avatar" id="avatar-icon">?</div>
                <h3 id="profile-name">Gracz</h3>
                <small style="color:var(--accent)">Ranga: VENTURA ELITE</small>
            </div>

            <h4 style="color:gray; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px;">Aktywność</h4>
            <div id="social-list">
                </div>
        </aside>
    </div>

    <script>
        // --- START SYSTEMU ---
        function bootSystem() {
            const nick = document.getElementById('user-input').value || "User";
            document.getElementById('profile-name').innerText = nick;
            document.getElementById('avatar-icon').innerText = nick[0].toUpperCase();

            document.getElementById('login-screen').style.opacity = '0';
            document.getElementById('login-screen').style.transform = 'scale(0.9)';
            
            setTimeout(() => {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app-container').style.display = 'grid';
                generateMiniGames();
                generateSocial();
                addAlert("System", "Autoryzacja pomyślna. Witaj " + nick);
            }, 800);
        }

        // --- GENERATOR 150 GIER ---
        function generateMiniGames() {
            const container = document.getElementById('mini-container');
            const types = ["Mario", "PacMan", "Tetris", "Sonic", "Snake", "Doom", "Retro", "Galaga"];
            
            for(let i=1; i<=150; i++) {
                const gameName = types[i % types.length] + " v" + i;
                const mockIP = `mini-server.zeentx:${2000 + i}`;
                
                const card = document.createElement('div');
                card.className = 'mini-card';
                card.innerHTML = `
                    <div style="font-size: 1.5rem; margin-bottom: 10px;">🕹️</div>
                    <h4>${gameName}</h4>
                    <div class="ip-label">${mockIP}</div>
                `;
                
                card.onclick = () => copyIP(mockIP, gameName);
                container.appendChild(card);
            }
        }

        // --- FUNKCJA KOPIOWANIA ---
        function copyIP(ip, name) {
            navigator.clipboard.writeText(ip);
            addAlert("Schowek", "Skopiowano adres " + name + ": " + ip);
        }

        // --- SYSTEM ALERTÓW ---
        function addAlert(title, msg) {
            const stack = document.getElementById('alert-stack');
            const el = document.createElement('div');
            el.className = 'v-alert';
            el.innerHTML = `
                <b style="color:var(--accent); display:block; margin-bottom:5px;">${title}</b>
                <span style="font-size:0.85rem; color:gray;">${msg}</span>
            `;
            stack.appendChild(el);
            setTimeout(() => el.classList.add('active'), 100);
            setTimeout(() => {
                el.classList.remove('active');
                setTimeout(() => el.remove(), 600);
            }, 4000);
        }

        // --- ZNAJOMI ---
        function generateSocial() {
            const friends = ["Admin_Zeentx", "V_Dev", "CyberMan", "Retro_Gamer"];
            const container = document.getElementById('social-list');
            friends.forEach(f => {
                const item = document.createElement('div');
                item.style.padding = "10px 0";
                item.style.display = "flex";
                item.style.alignItems = "center";
                item.style.gap = "12px";
                item.innerHTML = `
                    <div style="width:8px; height:8px; border-radius:50%; background:#00ff88;"></div>
                    <span style="color:gray; font-size:0.9rem">${f}</span>
                `;
                container.appendChild(item);
            });
        }
    </script>
</body>
</html>
