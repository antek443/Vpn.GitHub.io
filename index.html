<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEENTX | OMNI-ARCADE</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&family=JetBrains+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent: #ff0055;
            --accent-glow: rgba(255, 0, 85, 0.4);
            --bg: #050508;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --text: #ffffff;
            --ease: cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: var(--bg); color: var(--text); 
            font-family: 'Outfit', sans-serif; overflow: hidden; height: 100vh;
        }

        /* --- BACKGROUND ANIMATION --- */
        .bg-glow {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 10% 10%, #200020 0%, transparent 50%),
                        radial-gradient(circle at 90% 90%, #000030 0%, transparent 50%);
            z-index: -1;
        }

        /* --- ALERTY --- */
        #alert-container {
            position: fixed; top: 30px; right: 30px; z-index: 10000;
            display: flex; flex-direction: column; gap: 12px;
        }
        .alert {
            background: rgba(10, 10, 15, 0.9); border: 1px solid var(--border);
            border-left: 5px solid var(--accent); padding: 20px; border-radius: 15px;
            backdrop-filter: blur(20px); transform: translateX(150%);
            transition: 0.6s var(--ease); box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }
        .alert.active { transform: translateX(0); }

        /* --- REJESTRACJA --- */
        #auth-overlay {
            position: fixed; inset: 0; z-index: 5000; background: var(--bg);
            display: flex; justify-content: center; align-items: center; transition: 1s var(--ease);
        }
        .auth-card {
            width: 400px; padding: 50px; background: var(--card-bg);
            border: 1px solid var(--border); border-radius: 40px; text-align: center;
            backdrop-filter: blur(40px); border-top: 1px solid rgba(255,255,255,0.2);
        }
        input {
            width: 100%; padding: 18px; margin: 12px 0; background: rgba(0,0,0,0.4);
            border: 1px solid var(--border); border-radius: 15px; color: white; transition: 0.3s;
        }
        input:focus { border-color: var(--accent); box-shadow: 0 0 15px var(--accent-glow); }
        .btn-launch {
            width: 100%; padding: 20px; background: var(--accent); border: none;
            border-radius: 18px; color: white; font-weight: 900; cursor: pointer;
            margin-top: 20px; letter-spacing: 2px;
        }

        /* --- MAIN LAYOUT --- */
        #main-app { display: none; grid-template-columns: 300px 1fr 300px; height: 100vh; }

        .sidebar { border-right: 1px solid var(--border); padding: 40px 25px; }
        .nav-link {
            padding: 18px; margin-bottom: 10px; border-radius: 20px; cursor: pointer;
            display: flex; align-items: center; gap: 15px; color: rgba(255,255,255,0.4);
            transition: 0.4s var(--ease); font-weight: 600;
        }
        /* VENTURA HOVER EFFECT */
        .nav-link:hover {
            background: rgba(255,255,255,0.05); color: white;
            transform: translateX(15px) translateY(-5px);
            box-shadow: -10px 15px 30px rgba(0,0,0,0.3);
        }
        .nav-link.active { background: var(--accent); color: white; box-shadow: 0 10px 25px var(--accent-glow); }

        /* --- GAME GRID --- */
        .game-viewport { padding: 40px; overflow-y: auto; scroll-behavior: smooth; }
        .game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 25px; }

        /* VENTURA GAME CARD */
        .game-card {
            background: var(--card-bg); border: 1px solid var(--border);
            padding: 25px; border-radius: 30px; cursor: pointer;
            transition: 0.5s var(--ease); text-align: center;
        }
        .game-card:hover {
            transform: translateY(-20px) scale(1.05);
            border-color: var(--accent);
            box-shadow: 0 40px 60px rgba(0,0,0,0.6), 0 0 20px var(--accent-glow);
        }
        .game-card i { font-size: 2.5rem; color: var(--accent); margin-bottom: 15px; }
        .game-card h4 { font-weight: 900; margin-bottom: 5px; }
        .game-card .status { font-size: 0.7rem; color: #00ff88; text-transform: uppercase; }

        /* SOCIAL BAR */
        .social-bar { border-left: 1px solid var(--border); padding: 40px 20px; }
        .user-info { background: rgba(255,255,255,0.03); padding: 20px; border-radius: 25px; margin-bottom: 30px; }

        /* ONLINE GAME SECTION */
        .online-banner {
            grid-column: 1 / -1; background: linear-gradient(90deg, #7000ff, #ff0055);
            padding: 40px; border-radius: 35px; margin-bottom: 40px; display: flex;
            justify-content: space-between; align-items: center; cursor: pointer;
            transition: 0.4s var(--ease);
        }
        .online-banner:hover { transform: scale(1.02) translateY(-10px); box-shadow: 0 20px 40px rgba(255,0,85,0.3); }

    </style>
</head>
<body>

    <div class="bg-glow"></div>
    <div id="alert-container"></div>

    <div id="auth-overlay">
        <div class="auth-card">
            <h1 style="font-weight: 900; font-size: 2.5rem; margin-bottom: 10px;">ZEENTX<span style="color:var(--accent)">.ARCADE</span></h1>
            <p style="color: gray; margin-bottom: 30px;">Zarejestruj profil gracza</p>
            <input type="text" id="username" placeholder="Twój Nick">
            <input type="password" placeholder="Hasło">
            <button class="btn-launch" onclick="launchArcade()">WEJDŹ DO GRY</button>
        </div>
    </div>

    <div id="main-app">
        <aside class="sidebar">
            <div style="font-weight: 900; font-size: 1.5rem; margin-bottom: 50px;">OMNI HUB</div>
            <div class="nav-link active"><i class="fas fa-gamepad"></i> Wszystkie Gry</div>
            <div class="nav-link"><i class="fas fa-bolt"></i> Popularne</div>
            <div class="nav-link"><i class="fas fa-globe"></i> Gry Online</div>
            <div class="nav-link"><i class="fas fa-trophy"></i> Rankingi</div>
        </aside>

        <main class="game-viewport">
            <div id="online-games">
                <div class="online-banner" onclick="spawnAlert('Online', 'Kopiowanie linku do pokoju: SERVER-EU-1')">
                    <div>
                        <h2 style="font-size: 2rem; font-weight: 900;">MULTI-DUEL 1v1</h2>
                        <p>Dołącz do aktywnej gry online z innymi graczami.</p>
                    </div>
                    <div style="background: white; color: black; padding: 15px 30px; border-radius: 15px; font-weight: 900;">GRAJ TERAZ</div>
                </div>
            </div>

            <h2 style="font-size: 2.5rem; font-weight: 900; margin-bottom: 30px;">Biblioteka <span style="color:var(--accent)">(250)</span></h2>
            
            <div class="game-grid" id="master-grid">
                </div>
        </main>

        <aside class="social-bar">
            <div class="user-info">
                <div style="width: 50px; height: 50px; background: var(--accent); border-radius: 15px; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; font-weight: 900;" id="av-text">U</div>
                <b id="u-display">Gracz</b><br>
                <small style="color: gray;">Ranga: Legend</small>
            </div>
            
            <h3>Znajomi</h3>
            <div id="friends" style="margin-top: 20px;">
                <div style="display:flex; gap:10px; margin-bottom:15px; opacity: 0.6;">
                    <div style="width:10px; height:10px; border-radius:50%; background:#00ff88;"></div>
                    <span>Mario_Dev</span>
                </div>
                <div style="display:flex; gap:10px; margin-bottom:15px; opacity: 0.6;">
                    <div style="width:10px; height:10px; border-radius:50%; background:#00ff88;"></div>
                    <span>Cyber_Kid</span>
                </div>
            </div>
        </aside>
    </div>

    <script>
        const gameTitles = ["Super Mario", "Cyber Rush", "Ninja Blade", "Tetris Z", "Pixel Quest", "Space Wars", "Dino Run", "Retro Drift"];
        const icons = ["fa-mandalorian", "fa-ghost", "fa-dragon", "fa-robot", "fa-rocket", "fa-meteor"];

        // 1. Start systemu
        function launchArcade() {
            const nick = document.getElementById('username').value || "Player";
            document.getElementById('u-display').innerText = nick;
            document.getElementById('av-text').innerText = nick[0].toUpperCase();
            
            document.getElementById('auth-overlay').style.transform = 'translateY(-100%)';
            setTimeout(() => {
                document.getElementById('auth-overlay').style.display = 'none';
                document.getElementById('main-app').style.display = 'grid';
                generateGames();
                spawnAlert("Witaj!", "Zalogowano jako " + nick + ". Miłej gry!");
            }, 800);
        }

        // 2. Generator 250 gier
        function generateGames() {
            const grid = document.getElementById('master-grid');
            for(let i=1; i<=250; i++) {
                const title = gameTitles[i % gameTitles.length];
                const icon = icons[i % icons.length];
                const card = document.createElement('div');
                card.className = 'game-card';
                
                // Losowe IP/Link serwera
                const mockIP = `192.168.${Math.floor(Math.random()*255)}.${i}`;

                card.innerHTML = `
                    <i class="fas ${icon}"></i>
                    <h4>${title} #${i}</h4>
                    <span class="status">● Gotowa</span>
                    <div style="margin-top:15px; font-size: 0.6rem; color:gray; font-family: 'JetBrains Mono'">${mockIP}</div>
                `;

                // LOGIKA: KLIKNIĘCIE KOPIUJE IP / LINK
                card.onclick = () => {
                    navigator.clipboard.writeText(mockIP);
                    spawnAlert("Kopiowanie", "Skopiowano adres serwera gry: " + mockIP);
                    
                    // Wizualny klik
                    card.style.transform = 'scale(0.95)';
                    setTimeout(() => card.style.transform = '', 100);
                };

                grid.appendChild(card);
            }
        }

        // 3. System Alertów
        function spawnAlert(title, msg) {
            const container = document.getElementById('alert-container');
            const el = document.createElement('div');
            el.className = 'alert';
            el.innerHTML = `
                <b style="color:var(--accent); display:block; font-size:0.8rem; margin-bottom:5px;">${title}</b>
                <span style="font-size:0.9rem">${msg}</span>
            `;
            container.appendChild(el);
            setTimeout(() => el.classList.add('active'), 50);
            setTimeout(() => {
                el.classList.remove('active');
                setTimeout(() => el.remove(), 600);
            }, 3000);
        }
    </script>
</body>
</html>
