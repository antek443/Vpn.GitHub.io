<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZeentxPL VPN | Admin Control</title>
    <style>
        :root {
            --primary: #ff4ecd;
            --secondary: #00d2ff;
            --discord: #5865F2;
            --admin-color: #ff4444;
            --bg-dark: #0a0a12;
            --glass: rgba(255, 255, 255, 0.08);
        }

        body, html {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', sans-serif;
            color: white; background: var(--bg-dark);
            height: 100%; overflow-x: hidden;
        }

        .bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(-45deg, #0f0c29, #1a1a2e, #24243e, #533483);
            background-size: 400% 400%; animation: gradient 15s infinite ease; z-index: -2;
        }
        @keyframes gradient { 0% {background-position: 0% 50%} 50% {background-position: 100% 50%} 100% {background-position: 0% 50%} }

        /* Języki */
        .lang-switcher { position: fixed; top: 20px; right: 20px; z-index: 3000; }
        .lang-btn { background: var(--glass); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 8px 12px; cursor: pointer; border-radius: 8px; font-weight: bold; }
        .lang-btn:hover { background: var(--primary); }

        /* AUTH */
        #auth-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            z-index: 2000; background: var(--bg-dark); transition: 0.8s cubic-bezier(0.7, 0, 0.3, 1);
        }
        .auth-box {
            background: var(--glass); backdrop-filter: blur(20px);
            padding: 40px; border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center; width: 90%; max-width: 400px;
        }
        input {
            width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.5); color: white; box-sizing: border-box;
        }
        .btn {
            width: 100%; padding: 15px; margin-top: 10px; border-radius: 12px;
            border: none; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .btn-main { background: var(--primary); color: white; }
        .btn-sub { background: transparent; color: var(--secondary); border: 1px solid var(--secondary); margin-top: 5px; }

        /* MAIN */
        #main-content { display: none; opacity: 0; flex-direction: column; align-items: center; width: 100%; padding-bottom: 50px; }
        .top-nav { width: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(15px); padding: 15px 0; display: flex; justify-content: center; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--glass); }
        .container { width: 90%; max-width: 1000px; }
        .box { background: var(--glass); backdrop-filter: blur(20px); border-radius: 25px; padding: 30px; margin-top: 30px; border: 1px solid rgba(255,255,255,0.1); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; margin-top: 20px; }
        .card { background: rgba(0,0,0,0.4); padding: 20px; border-radius: 20px; text-align: center; cursor: pointer; transition: 0.3s; }
        .card:hover { transform: translateY(-10px); background: var(--primary); }

        /* ADMIN STYLE */
        #admin-panel { display: none; margin-top: 30px; border: 2px solid var(--admin-color); box-shadow: 0 0 20px rgba(255, 68, 68, 0.2); }
        .user-row { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); margin-top: 5px; border-radius: 10px; }
        .reset-btn { background: var(--admin-color); color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .reset-btn:hover { filter: brightness(1.2); }

        /* MODAL */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 3000; }
        .modal { background: #16213e; padding: 40px; border-radius: 30px; border: 2px solid var(--primary); text-align: center; width: 85%; max-width: 400px; }
    </style>
</head>
<body>

<div class="bg"></div>

<div class="lang-switcher">
    <button class="lang-btn" onclick="setLang('pl')">PL 🇵🇱</button>
    <button class="lang-btn" onclick="setLang('en')">EN 🇬🇧</button>
</div>

<div id="auth-screen">
    <div class="auth-box">
        <h2 id="auth-title">🔐 ZeentxPL LOGIN</h2>
        <input type="text" id="auth-user" placeholder="User">
        <input type="password" id="auth-pass" placeholder="Password">
        <button class="btn btn-main" id="btn-primary" onclick="handleAuth()">LOGIN</button>
        <button class="btn btn-sub" id="btn-secondary" onclick="toggleAuthMode()">CREATE ACCOUNT</button>
        <p id="auth-error" style="color: #ff4444; display: none; margin-top: 15px;"></p>
    </div>
</div>

<div id="main-content">
    <div class="top-nav">
        <a href="https://discord.com/invite/bHeSDzrrjR" target="_blank" style="text-decoration:none; color:white; background:var(--discord); padding:10px 25px; border-radius:50px; font-weight:bold;">💬 DISCORD</a>
    </div>

    <div class="container">
        <h1 style="text-align:center; font-size: 3rem; margin: 40px 0;">ZeentxPL VPN</h1>
        <div class="box">
            <h2 id="welcome-txt">Witaj w Panelu Premium</h2>
            <div class="grid" id="grid"></div>
        </div>

        <div class="box" id="admin-panel">
            <h2 style="color: var(--admin-color)">👑 PANEL ADMINSTRATORA</h2>
            <p id="admin-desc">Zarządzanie kontami użytkowników:</p>
            <div id="user-list"></div>
        </div>
    </div>
</div>

<div class="overlay" id="overlay" onclick="if(event.target.id=='overlay') this.style.display='none'">
    <div class="modal">
        <h2 id="m-title">KRAJ</h2>
        <div id="m-ip" style="font-size: 2rem; color: var(--secondary); margin: 20px 0; font-family: monospace;">0.0.0.0</div>
        <button class="btn btn-main" id="m-copy-btn" onclick="copyIP()">📋 COPY IP</button>
    </div>
</div>

<script>
    let isLoginMode = true;
    let currentLang = 'pl';
    // ADMIN HASŁO USTAWIONE NA 123456
    let users = JSON.parse(localStorage.getItem('vpn_users')) || { "admin": "123456" };
    let loggedUser = "";

    const translations = {
        pl: {
            loginTitle: "🔐 ZeentxPL LOGOWANIE",
            regTitle: "📝 UTWÓRZ KONTO",
            loginBtn: "ZALOGUJ SIĘ",
            regBtn: "ZAREJESTRUJ SIĘ",
            toggleToReg: "NIE MASZ KONTA? UTWÓRZ JE",
            toggleToLogin: "MASZ JUŻ KONTO? ZALOGUJ SIĘ",
            errorAuth: "Błędny login lub hasło!",
            welcome: "Witaj w Panelu Premium, ",
            copyBtn: "📋 SKOPIUJ IP",
            copied: "✅ SKOPIOWANO!",
            adminReset: "RESETUJ HASŁO"
        },
        en: {
            loginTitle: "🔐 ZeentxPL LOGIN",
            regTitle: "📝 CREATE ACCOUNT",
            loginBtn: "LOGIN",
            regBtn: "REGISTER",
            toggleToReg: "NO ACCOUNT? CREATE ONE",
            toggleToLogin: "HAVE ACCOUNT? LOGIN",
            errorAuth: "Invalid credentials!",
            welcome: "Welcome to Premium Panel, ",
            copyBtn: "📋 COPY IP",
            copied: "✅ COPIED!",
            adminReset: "RESET PASSWORD"
        }
    };

    function setLang(lang) {
        currentLang = lang;
        updateUI();
    }

    function updateUI() {
        const t = translations[currentLang];
        document.getElementById('auth-title').innerText = isLoginMode ? t.loginTitle : t.regTitle;
        document.getElementById('btn-primary').innerText = isLoginMode ? t.loginBtn : t.regBtn;
        document.getElementById('btn-secondary').innerText = isLoginMode ? t.toggleToReg : t.toggleToLogin;
        document.getElementById('m-copy-btn').innerText = t.copyBtn;
    }

    function toggleAuthMode() {
        isLoginMode = !isLoginMode;
        updateUI();
    }

    function handleAuth() {
        const u = document.getElementById('auth-user').value;
        const p = document.getElementById('auth-pass').value;
        const err = document.getElementById('auth-error');

        if (isLoginMode) {
            if (users[u] && users[u] === p) {
                loginSuccess(u);
            } else {
                err.innerText = translations[currentLang].errorAuth;
                err.style.display = "block";
            }
        } else {
            if (u.toLowerCase() === "admin") {
                alert("Nie możesz utworzyć konta admin!");
                return;
            }
            users[u] = p;
            localStorage.setItem('vpn_users', JSON.stringify(users));
            alert("Konto utworzone! Zaloguj się.");
            toggleAuthMode();
        }
    }

    function loginSuccess(u) {
        loggedUser = u;
        document.getElementById('auth-screen').style.transform = "translateY(-100%)";
        setTimeout(() => {
            document.getElementById('auth-screen').style.display = "none";
            document.getElementById('main-content').style.display = "flex";
            document.getElementById('welcome-txt').innerText = translations[currentLang].welcome + u;
            setTimeout(() => document.getElementById('main-content').style.opacity = "1", 50);
            if(u === "admin") showAdminPanel();
        }, 800);
    }

    function showAdminPanel() {
        document.getElementById('admin-panel').style.display = "block";
        const list = document.getElementById('user-list');
        list.innerHTML = "";
        for (let u in users) {
            if(u === 'admin') continue;
            const div = document.createElement('div');
            div.className = "user-row";
            div.innerHTML = `<span>👤 <b>${u}</b> (Hasło: ${users[u]})</span> 
                             <button class="reset-btn" onclick="resetUser('${u}')">${translations[currentLang].adminReset}</button>`;
            list.appendChild(div);
        }
    }

    function resetUser(u) {
        users[u] = "123456"; // Reset do domyślnego
        localStorage.setItem('vpn_users', JSON.stringify(users));
        showAdminPanel();
        alert("Zresetowano hasło użytkownika " + u + " na: 123456");
    }

    // Kraje
    const kraje = [
        {n: 'Polska', f: '🇵🇱'}, {n: 'USA', f: '🇺🇸'}, {n: 'Niemcy', f: '🇩🇪'}, {n: 'UK', f: '🇬🇧'},
        {n: 'Japonia', f: '🇯🇵'}, {n: 'Francja', f: '🇫🇷'}, {n: 'Brazylia', f: '🇧🇷'}, {n: 'Kanada', f: '🇨🇦'},
        {n: 'Szwecja', f: '🇸🇪'}, {n: 'Norwegia', f: '🇳🇴'}, {n: 'Włochy', f: '🇮🇹'}, {n: 'Korea', f: '🇰🇷'}
    ];

    const grid = document.getElementById('grid');
    kraje.forEach(k => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `<div style="font-size:2rem">${k.f}</div><b>${k.n}</b>`;
        card.onclick = () => {
            const ip = `${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}.12.${Math.floor(Math.random()*255)}`;
            document.getElementById('m-title').innerText = k.f + " " + k.n;
            document.getElementById('m-ip').innerText = ip;
            document.getElementById('overlay').style.display = "flex";
        };
        grid.appendChild(card);
    });

    function copyIP() {
        const ip = document.getElementById('m-ip').innerText;
        navigator.clipboard.writeText(ip);
        const btn = document.getElementById('m-copy-btn');
        btn.innerText = translations[currentLang].copied;
        setTimeout(() => btn.innerText = translations[currentLang].copyBtn, 1500);
    }

    updateUI();
</script>
</body>
</html>
