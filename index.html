<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZeentxPL VPN | Ultimate Experience</title>

    <style>
        :root {
            --primary: #ff4ecd;
            --secondary: #00d2ff;
            --discord: #5865F2;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            background: #0a0a12;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        
        .bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(45deg, #0f0c29, #302b63, #24243e);
            background-size: 400% 400%;
            animation: gradient 15s infinite;
            z-index: -2;
        }

        @keyframes gradient {
            0% {background-position: 0% 50%}
            50% {background-position: 100% 50%}
            100% {background-position: 0% 50%}
        }

        h1 {
            font-size: 3.5rem;
            margin-top: 40px;
            text-shadow: 0 0 20px var(--primary);
            animation: float 3s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .container { width: 90%; max-width: 1000px; z-index: 1; }

        /* Szklane pudełka */
        .box {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px;
            margin: 20px 0;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .box:hover {
            transform: translateY(-15px);
            border-color: var(--primary);
            box-shadow: 0 20px 50px rgba(255, 78, 205, 0.2);
        }

        /* Siatka krajów */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
        }

        .card {
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid transparent;
        }

        .card:hover {
            background: var(--primary);
            transform: scale(1.1) rotate(3deg);
        }

        /* MODAL (GUI po kliknięciu) */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .modal {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            padding: 40px;
            border-radius: 30px;
            border: 2px solid var(--primary);
            text-align: center;
            width: 90%;
            max-width: 400px;
            transform: scale(0.5);
            opacity: 0;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal.active { transform: scale(1); opacity: 1; }

        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            margin: 10px;
            transition: 0.3s;
            text-transform: uppercase;
            text-decoration: none;
            display: inline-block;
        }

        .btn-copy { background: var(--primary); color: white; box-shadow: 0 0 20px var(--primary); }
        .btn-dc { background: var(--discord); color: white; box-shadow: 0 0 20px var(--discord); }
        .btn:hover { transform: scale(1.1); filter: brightness(1.2); }

        #ip-text {
            font-size: 1.5rem;
            color: var(--secondary);
            margin: 20px 0;
            font-family: monospace;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 10px;
        }

        .close-modal {
            position: absolute;
            top: 15px; right: 20px;
            cursor: pointer;
            font-size: 1.5rem;
        }
    </style>
</head>
<body>

    <div class="bg"></div>

    <div class="modal-overlay" id="overlay">
        <div class="modal" id="modal">
            <span class="close-modal" onclick="closeModal()">×</span>
            <h2 id="modal-title">Łączenie...</h2>
            <div id="ip-text">---.---.---.---</div>
            <button class="btn btn-copy" onclick="copyToClipboard()">📋 SKOPIUJ IP</button>
            <br>
            <a href="https://discord.gg/TWOJ-LINK" target="_blank" class="btn btn-dc">💬 MÓJ DISCORD</a>
        </div>
    </div>

    <div class="container">
        <h1>🌍 ZeentxPL VPN</h1>

        <div class="box">
            <h2>🛡️ Status Systemu</h2>
            <button class="btn btn-copy" style="background:#00d2ff; box-shadow: 0 0 15px #00d2ff;" onclick="alert('Twoje bazowe IP jest chronione!')">SPRAWDŹ ZABEZPIECZENIA</button>
        </div>

        <div class="box">
            <h2>Wybierz węzeł połączenia:</h2>
            <div class="grid" id="grid"></div>
        </div>
    </div>

    <script>
        const kraje = [
            {n: 'USA', f: '🇺🇸'}, {n: 'Polska', f: '🇵🇱'}, {n: 'Niemcy', f: '🇩🇪'}, {n: 'Japonia', f: '🇯🇵'},
            {n: 'UK', f: '🇬🇧'}, {n: 'Francja', f: '🇫🇷'}, {n: 'Kanada', f: '🇨🇦'}, {n: 'Brazylia', f: '🇧🇷'},
            {n: 'Włochy', f: '🇮🇹'}, {n: 'Australia', f: '🇦🇺'}, {n: 'Holandia', f: '🇳🇱'}, {n: 'Szwecja', f: '🇸🇪'},
            {n: 'Szwajcaria', f: '🇨🇭'}, {n: 'Norwegia', f: '🇳🇴'}, {n: 'Hiszpania', f: '🇪🇸'}, {n: 'Indie', f: '🇮🇳'},
            {n: 'Meksyk', f: '🇲🇽'}, {n: 'Singapur', f: '🇸🇬'}, {n: 'Islandia', f: '🇮🇸'}, {n: 'Korea', f: '🇰🇷'}
        ];

        let currentIP = "";

        // Generowanie kafelków
        const grid = document.getElementById('grid');
        kraje.forEach(k => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<span style="font-size:2.5rem">${k.f}</span><br><b>${k.n}</b>`;
            card.onclick = () => openModal(k.n, k.f);
            grid.appendChild(card);
        });

        function openModal(nazwa, flaga) {
            currentIP = `${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}`;
            
            document.getElementById('modal-title').innerText = `${flaga} POŁĄCZONO Z ${nazwa}`;
            document.getElementById('ip-text').innerText = currentIP;
            
            document.getElementById('overlay').style.display = 'flex';
            setTimeout(() => {
                document.getElementById('modal').classList.add('active');
            }, 10);
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            setTimeout(() => {
                document.getElementById('overlay').style.display = 'none';
            }, 300);
        }

        function copyToClipboard() {
            navigator.clipboard.writeText(currentIP).then(() => {
                const btn = document.querySelector('.btn-copy');
                const originalText = btn.innerText;
                btn.innerText = "✅ SKOPIOWANO!";
                btn.style.background = "#00ff88";
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.style.background = "";
                }, 2000);
            });
        }

        // Zamknij po kliknięciu poza modalem
        window.onclick = function(event) {
            if (event.target == document.getElementById('overlay')) {
                closeModal();
            }
        }
    </script>
</body>
</html>
