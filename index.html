<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZeentxPL VPN | Premium Dashboard</title>

    <style>
        :root {
            --primary: #ff4ecd;
            --secondary: #00d2ff;
            --discord: #5865F2;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            background: #0a0a12;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

       
        .bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #533483);
            background-size: 400% 400%;
            animation: gradient 15s infinite ease;
            z-index: -2;
        }

        @keyframes gradient {
            0% {background-position: 0% 50%}
            50% {background-position: 100% 50%}
            100% {background-position: 0% 50%}
        }

        /* GÓRNY PASEK DISCORD */
        .top-nav {
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            padding: 10px 0;
            border-bottom: 1px solid var(--glass);
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .dc-link {
            display: flex;
            align-items: center;
            text-decoration: none;
            color: white;
            background: var(--discord);
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: 0 0 15px var(--discord);
        }

        .dc-link:hover {
            transform: scale(1.05);
            filter: brightness(1.2);
        }

        .dc-gif {
            width: 30px;
            height: 30px;
            margin-right: 10px;
        }

        /* Kontener główny */
        .container {
            width: 90%;
            max-width: 1000px;
            padding-top: 20px;
        }

        h1 {
            font-size: 3rem;
            text-align: center;
            text-shadow: 0 0 20px var(--primary);
            margin: 30px 0;
        }

        /* Pudełka */
        .box {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 25px;
            margin-bottom: 30px;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .box:hover {
            transform: translateY(-12px);
            border-color: var(--primary);
            box-shadow: 0 15px 40px rgba(255, 78, 205, 0.2);
        }

        /* Siatka krajów */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
        }

        .card {
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
            border: 1px solid transparent;
        }

        .card:hover {
            background: var(--primary);
            transform: scale(1.1) rotate(2deg);
            box-shadow: 0 0 20px var(--primary);
        }

        /* MODAL (GUI) */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(8px);
        }

        .modal {
            background: #16213e;
            padding: 40px;
            border-radius: 30px;
            border: 2px solid var(--primary);
            text-align: center;
            max-width: 350px;
            width: 80%;
            transform: translateY(50px);
            opacity: 0;
            transition: 0.4s ease-out;
        }

        .overlay.active { display: flex; }
        .overlay.active .modal { transform: translateY(0); opacity: 1; }

        .ip-display {
            font-size: 1.6rem;
            color: var(--secondary);
            background: rgba(0,0,0,0.4);
            padding: 15px;
            border-radius: 12px;
            margin: 20px 0;
            font-family: monospace;
            border: 1px dashed var(--secondary);
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            background: var(--primary);
            color: white;
            width: 100%;
        }

        .btn:hover { transform: scale(1.05); filter: brightness(1.1); }

    </style>
</head>
<body>

    <div class="bg"></div>

    <div class="top-nav">
        <a href="https://discord.gg/TWÓJ_KOD" target="_blank" class="dc-link">
            <img src="cash_fly.gif" class="dc-gif" alt="Cash">
            DOŁĄCZ DO DISCORDA
        </a>
    </div>

    <div class="container">
        <h1>🌍 ZeentxPL VPN</h1>

        <div class="box">
            <h2>🛡️ Informacje o systemie</h2>
            <p>Wybierz serwer poniżej, aby wygenerować bezpieczne połączenie.</p>
        </div>

        <div class="box">
            <h2>Dostępne Lokalizacje (20)</h2>
            <div class="grid" id="grid"></div>
        </div>
    </div>

    <div class="overlay" id="overlay" onclick="closeModal(event)">
        <div class="modal">
            <h2 id="m-title">Kraj</h2>
            <p>Twoje nowe bezpieczne IP:</p>
            <div class="ip-display" id="m-ip">0.0.0.0</div>
            <button class="btn" onclick="copyIP()">📋 SKOPIUJ IP</button>
            <p style="font-size: 0.8rem; margin-top: 15px; opacity: 0.6;">Kliknij poza oknem, aby zamknąć</p>
        </div>
    </div>

    <script>
        const kraje = [
            {n: 'Polska', f: '🇵🇱'}, {n: 'USA', f: '🇺🇸'}, {n: 'Niemcy', f: '🇩🇪'}, {n: 'Japonia', f: '🇯🇵'},
            {n: 'UK', f: '🇬🇧'}, {n: 'Kanada', f: '🇨🇦'}, {n: 'Francja', f: '🇫🇷'}, {n: 'Brazylia', f: '🇧🇷'},
            {n: 'Włochy', f: '🇮🇹'}, {n: 'Australia', f: '🇦🇺'}, {n: 'Holandia', f: '🇳🇱'}, {n: 'Szwajcaria', f: '🇨🇭'},
            {n: 'Singapur', f: '🇸🇬'}, {n: 'Korea', f: '🇰🇷'}, {n: 'Szwecja', f: '🇸🇪'}, {n: 'Norwegia', f: '🇳🇴'},
            {n: 'Meksyk', f: '🇲🇽'}, {n: 'Hiszpania', f: '🇪🇸'}, {n: 'Islandia', f: '🇮🇸'}, {n: 'Indie', f: '🇮🇳'}
        ];

        const grid = document.getElementById('grid');
        let generatedIP = "";

        // Tworzenie kart
        kraje.forEach(k => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<div style="font-size:2.5rem">${k.f}</div><b>${k.n}</b>`;
            card.onclick = () => openModal(k.n, k.f);
            grid.appendChild(card);
        });

        function openModal(name, flag) {
            generatedIP = `${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}`;
            document.getElementById('m-title').innerText = `${flag} ${name}`;
            document.getElementById('m-ip').innerText = generatedIP;
            document.getElementById('overlay').classList.add('active');
        }

        function closeModal(e) {
            if (e.target.id === 'overlay') {
                document.getElementById('overlay').classList.remove('active');
            }
        }

        function copyIP() {
            navigator.clipboard.writeText(generatedIP);
            const btn = document.querySelector('.btn');
            btn.innerText = "✅ SKOPIOWANO!";
            btn.style.background = "#00ff88";
            setTimeout(() => {
                btn.innerText = "📋 SKOPIUJ IP";
                btn.style.background = "";
            }, 1500);
        }
    </script>
</body>
</html>
