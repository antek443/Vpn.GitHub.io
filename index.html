<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEENTX | OMNI HUB</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent: #00ffcc;
            --bg-dark: #050505;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: var(--bg-dark); color: white; 
            font-family: 'Outfit', sans-serif; overflow: hidden; height: 100vh;
        }

        /* --- ANIMOWANE TŁO (STYL VENTURA) --- */
        .bg-wrapper {
            position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(circle at center, #0a1210 0%, #050505 100%);
            overflow: hidden;
        }
        .orb {
            position: absolute; width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(0, 255, 204, 0.07) 0%, transparent 70%);
            border-radius: 50%; filter: blur(80px);
            animation: move 20s infinite alternate;
        }
        .orb-1 { top: -10%; left: -10%; }
        .orb-2 { bottom: -10%; right: -10%; animation-delay: -5s; }
        @keyframes move {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(100px, 50px) scale(1.2); }
        }

        /* --- LAYOUT --- */
        #app { display: grid; grid-template-columns: 280px 1fr; height: 100vh; position: relative; z-index: 10; }

        /* SIDEBAR 1:1 */
        .sidebar {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--border);
            padding: 40px;
            display: flex;
            flex-direction: column;
        }
        .logo { font-size: 1.5rem; font-weight: 900; letter-spacing: 2px; margin-bottom: 60px; }
        .logo span { color: var(--accent); }

        .nav-link {
            padding: 15px 0; color: #888; text-decoration: none; font-weight: 600;
            display: flex; align-items: center; gap: 15px; transition: 0.3s;
            cursor: pointer;
        }
        .nav-link:hover, .nav-link.active { color: white; transform: translateX(5px); }
        .nav-link i { color: var(--accent); font-size: 1.2rem; }

        /* MAIN CONTENT */
        .content { padding: 60px; overflow-y: auto; }
        h1 { font-size: 3rem; font-weight: 900; margin-bottom: 40px; }

        /* KARTY GIER (EFEKT UNIESIENIA) */
        .game-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; }
        .game-card {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .game-card::before {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(0, 255, 204, 0.1), transparent);
            opacity: 0; transition: 0.5s;
        }
        .game-card:hover {
            transform: translateY(-20px);
            border-color: var(--accent);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.8), 0 0 20px rgba(0, 255, 204, 0.2);
        }
        .game-card:hover::before { opacity: 1; }
        .game-card i { font-size: 3rem; color: var(--accent); margin-bottom: 20px; display: block; }
        .game-card h3 { font-size: 1.5rem; margin-bottom: 10px; }
        .game-card p { color: #888; font-size: 0.9rem; margin-bottom: 20px; }
        .play-btn {
            background: var(--accent); color: black; border: none;
            padding: 12px 30px; border-radius: 12px; font-weight: 900;
            text-transform: uppercase; letter-spacing: 1px;
        }

        /* OKNO GRY OVERLAY */
        #game-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            z-index: 1000; display: none; flex-direction: column;
            backdrop-filter: blur(10px);
        }
        .overlay-header {
            padding: 20px 40px; display: flex; justify-content: space-between;
            align-items: center; border-bottom: 1px solid var(--border);
        }
        .close-btn { 
            background: #ff4444; color: white; border: none; padding: 10px 25px; 
            border-radius: 8px; cursor: pointer; font-weight: 900; 
        }
        iframe { width: 100%; height: 100%; border: none; }

    </style>
</head>
<body>

    <div class="bg-wrapper">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <div id="game-overlay">
        <div class="overlay-header">
            <h2 id="current-title" style="color: var(--accent);">GRA</h2>
            <button class="close-btn" onclick="closeGame()">ZAMKNIJ X</button>
        </div>
        <iframe id="game-frame" src=""></iframe>
    </div>

    <div id="app">
        <aside class="sidebar">
            <div class="logo">ZEENTX<span>.HUB</span></div>
            <nav>
                <div class="nav-link active"><i class="fas fa-th-large"></i> Home</div>
                <div class="nav-link"><i class="fas fa-gamepad"></i> Biblioteka</div>
                <div class="nav-link"><i class="fas fa-user-friends"></i> Znajomi</div>
                <div class="nav-link"><i class="fas fa-cog"></i> Ustawienia</div>
            </nav>
            <div style="margin-top: auto; color: #444; font-size: 0.8rem;">Ver 1.0.4 - OMNI CLIENT</div>
        </aside>

        <main class="content">
            <h1>Witaj w <span>OMNI Hub</span></h1>
            
            <div class="game-grid">
                <div class="game-card" onclick="launch('Super Mario', 'https://www.retrogames.cc/embed/41724-super-mario-world-usa.html')">
                    <i class="fas fa-ghost"></i>
                    <h3>Mario Retro</h3>
                    <p>Klasyczna przygoda 16-bitowa.</p>
                    <button class="play-btn">Graj</button>
                </div>

                <div class="game-card" onclick="launch('Scrabble Sprint', 'https://poki.com/pl/g/scrabble-sprint')">
                    <i class="fas fa-font"></i>
                    <h3>Scrabble</h3>
                    <p>Wyzwanie słowne online.</p>
                    <button class="play-btn">Graj</button>
                </div>

                <div class="game-card" onclick="launch('Venge.io Shooter', 'https://venge.io/')">
                    <i class="fas fa-crosshairs"></i>
                    <h3>Strzelanka 3D</h3>
                    <p>Szybka akcja multiplayer.</p>
                    <button class="play-btn">Graj</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        function launch(name, url) {
            const overlay = document.getElementById('game-overlay');
            const frame = document.getElementById('game-frame');
            const title = document.getElementById('current-title');

            title.innerText = name.toUpperCase();
            overlay.style.display = 'flex';
            
            // Symulacja ładowania
            frame.src = url;
        }

        function closeGame() {
            const overlay = document.getElementById('game-overlay');
            const frame = document.getElementById('game-frame');
            overlay.style.display = 'none';
            frame.src = ""; // Stop audio z gry
        }

        // Prosta animacja kursora/tła przy ruchu myszy
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            document.querySelector('.orb-1').style.transform = `translate(${x * 50}px, ${y * 50}px)`;
            document.querySelector('.orb-2').style.transform = `translate(${-x * 50}px, ${-y * 50}px)`;
        });
    </script>
</body>
</html>
