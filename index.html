<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZeentxPL VPN | Ventura Ultimate Edition v2.5</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@400;600;800;900&family=JetBrains+Mono&display=swap" rel="stylesheet">
    
    <style>
        /* --- ZAAWANSOWANE ZMIENNE CSS --- */
        :root {
            --primary: #ff4ecd;
            --primary-glow: rgba(255, 78, 205, 0.3);
            --secondary: #00d2ff;
            --accent: #7000ff;
            --bg-black: #05050a;
            --sidebar-bg: #0d0d15;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-hover: rgba(255, 255, 255, 0.06);
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-dim: #666670;
            --admin-red: #ff4747;
            --success: #00ff88;
            --shadow-lg: 0 40px 100px rgba(0,0,0,0.8);
        }

        /* --- RESET I BAZA --- */
        * { 
            box-sizing: border-box; 
            outline: none; 
            user-select: none;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

        body, html { 
            margin: 0; padding: 0; 
            background: var(--bg-black); 
            color: var(--text-main); 
            font-family: 'Inter', sans-serif;
            height: 100vh; width: 100vw;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* --- ANIMOWANE TŁO --- */
        .animated-bg {
            position: fixed; inset: 0; z-index: -1;
            background: 
                radial-gradient(circle at 10% 10%, rgba(112, 0, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 90% 90%, rgba(255, 78, 205, 0.1) 0%, transparent 50%),
                var(--bg-black);
        }

        .bg-orb {
            position: absolute; width: 600px; height: 600px;
            background: var(--primary-glow);
            filter: blur(160px); border-radius: 50%;
            pointer-events: none; opacity: 0.15;
            animation: drift 25s infinite alternate ease-in-out;
        }

        @keyframes drift {
            0% { transform: translate(-10%, -10%); }
            100% { transform: translate(30%, 20%); }
        }

        /* --- SYSTEM AUTORYZACJI --- */
        #auth-overlay {
            position: fixed; inset: 0; z-index: 9999;
            display: flex; justify-content: center; align-items: center;
            background: var(--bg-black);
            transition: transform 1s cubic-bezier(0.86, 0, 0.07, 1), opacity 0.5s;
        }

        .auth-box {
            background: var(--sidebar-bg);
            width: 450px; padding: 60px;
            border-radius: 32px;
            border: 1px solid var(--border);
            text-align: center;
            box-shadow: var(--shadow-lg);
            position: relative;
        }

        .auth-logo {
            font-family: 'Poppins'; font-weight: 900; font-size: 2.2rem;
            margin-bottom: 35px; letter-spacing: -2px;
        }
        .auth-logo span { color: var(--primary); text-shadow: 0 0 20px var(--primary-glow); }

        .auth-tabs {
            display: flex; gap: 10px; margin-bottom: 30px;
            background: rgba(0,0,0,0.4); padding: 6px; border-radius: 16px;
        }
        .tab {
            flex: 1; padding: 12px; cursor: pointer; border-radius: 12px;
            font-size: 0.8rem; font-weight: 800; color: var(--text-dim);
            transition: 0.3s;
        }
        .tab.active { background: var(--primary); color: white; box-shadow: 0 8px 16px var(--primary-glow); }

        .input-wrapper { position: relative; margin-bottom: 18px; text-align: left; }
        .input-wrapper i { 
            position: absolute; left: 18px; top: 50%; transform: translateY(-50%);
            color: var(--text-dim); font-size: 1rem; transition: 0.3s;
        }
        
        .v-input {
            width: 100%; padding: 16px 16px 16px 50px;
            background: rgba(0,0,0,0.3); border: 1px solid var(--border);
            border-radius: 14px; color: white; font-size: 1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .v-input:focus { 
            border-color: var(--primary); 
            background: rgba(255,255,255,0.02); 
            box-shadow: 0 0 0 4px var(--primary-glow);
        }

        .btn-p {
            width: 100%; padding: 16px; border-radius: 14px; border: none;
            background: var(--primary); color: white; font-weight: 800;
            font-size: 1rem; cursor: pointer; transition: 0.3s;
            margin-top: 15px; text-transform: uppercase; letter-spacing: 1.5px;
        }
        .btn-p:hover { transform: translateY(-4px); box-shadow: 0 20px 40px var(--primary-glow); filter: brightness(1.1); }

        /* --- LAYOUT APLIKACJI --- */
        #app-wrapper {
            display: none; height: 100vh; width: 100vw;
            opacity: 0; transition: opacity 1.2s;
        }

        .sidebar {
            width: 300px; background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column;
            padding: 45px 0; z-index: 100;
        }

        .sidebar-brand { padding: 0 40px; margin-bottom: 50px; }
        .sidebar-brand h2 { font-family: 'Poppins'; font-weight: 900; font-size: 1.8rem; margin: 0; }
        .sidebar-brand span { color: var(--primary); }

        .nav-list { padding: 0 20px; flex-grow: 1; }
        .nav-head { color: var(--text-dim); font-size: 0.75rem; font-weight: 800; text-transform: uppercase; padding: 0 20px; margin: 25px 0 15px; letter-spacing: 2px; }
        
        .nav-link {
            padding: 15px 20px; display: flex; align-items: center; gap: 15px;
            color: var(--text-dim); cursor: pointer; border-radius: 15px;
            font-weight: 600; font-size: 0.95rem; margin-bottom: 8px;
            transition: all 0.3s ease;
        }
        .nav-link:hover { color: white; background: rgba(255,255,255,0.04); }
        .nav-link.active {
            color: white; background: linear-gradient(90deg, rgba(255, 78, 205, 0.15), transparent);
            border-left: 5px solid var(--primary);
        }

        .sidebar-bottom { padding: 30px; border-top: 1px solid var(--border); }
        .status-pill {
            display: flex; align-items: center; gap: 10px;
            background: rgba(0,255,136,0.1); padding: 10px;
            border-radius: 12px; color: var(--success); font-size: 0.8rem; font-weight: 700;
        }

        /* --- MAIN AREA --- */
        .main-view { flex-grow: 1; display: flex; flex-direction: column; overflow-y: auto; background: rgba(0,0,0,0.2); }
        .top-nav { padding: 35px 55px; display: flex; justify-content: space-between; align-items: center; backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 50; }

        .user-block {
            display: flex; align-items: center; gap: 15px;
            background: var(--card-bg); padding: 12px 24px;
            border-radius: 20px; border: 1px solid var(--border);
        }

        /* --- SERWERY --- */
        .content-scroll { padding: 0 55px 60px; }
        .server-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 25px; }

        .node-card {
            background: var(--card-bg); padding: 30px; border-radius: 26px;
            border: 1px solid var(--border); display: flex; align-items: center; gap: 20px;
            cursor: pointer; position: relative; transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .node-card:hover {
            transform: translateY(-15px) scale(1.03);
            background: var(--card-hover);
            border-color: rgba(255, 78, 205, 0.5);
            box-shadow: 0 35px 70px rgba(0,0,0,0.6);
        }

        .indicator {
            position: absolute; top: 25px; right: 25px;
            width: 12px; height: 12px; border-radius: 50%;
            background: var(--success); box-shadow: 0 0 15px var(--success);
        }

        /* --- ADMIN PANEL --- */
        #admin-section { margin-top: 50px; display: none; animation: fadeIn 0.8s ease; }
        .admin-box { background: rgba(255, 71, 71, 0.03); border: 2px dashed rgba(255, 71, 71, 0.2); border-radius: 24px; padding: 40px; }
        .admin-table { width: 100%; border-collapse: collapse; margin-top: 30px; }
        .admin-table th { text-align: left; color: var(--text-dim); padding: 15px; font-size: 0.85rem; border-bottom: 2px solid var(--border); }
        .admin-table td { padding: 20px 15px; border-bottom: 1px solid var(--border); font-size: 0.95rem; }

        .badge-del {
            background: rgba(255, 71, 71, 0.1); color: var(--admin-red);
            padding: 8px 16px; border-radius: 10px; font-size: 0.75rem;
            font-weight: 800; cursor: pointer; border: none; transition: 0.3s;
        }
        .badge-del:hover { background: var(--admin-red); color: white; }

        /* --- MODALE --- */
        .modal-overlay {
            position: fixed; inset: 0; z-index: 2000;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(15px);
            display: none; justify-content: center; align-items: center;
            opacity: 0; transition: 0.4s;
        }
        .modal-window {
            background: var(--sidebar-bg); width: 450px; padding: 60px;
            border-radius: 35px; border: 1px solid var(--primary); text-align: center;
            transform: scale(0.7); transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .modal-window.active { transform: scale(1); }

        .ip-box {
            background: #000; padding: 25px; border-radius: 20px;
            font-family: 'JetBrains Mono'; font-size: 2rem; color: var(--secondary);
            margin: 30px 0; border: 1px solid var(--border); letter-spacing: 2px;
        }

        .metrics { display: flex; gap: 20px; margin-bottom: 45px; }
        .metric-item { flex: 1; background: var(--card-bg); padding: 25px; border-radius: 20px; border: 1px solid var(--border); }
        .metric-item label { color: var(--text-dim); font-size: 0.7rem; font-weight: 800; display: block; margin-bottom: 10px; }
        .metric-item span { font-size: 1.6rem; font-weight: 900; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="animated-bg"></div>
    <div class="bg-orb"></div>

    <div id="auth-overlay">
        <div class="auth-box">
            <div class="auth-logo">ZEENTX<span>PL</span></div>
            
            <div class="auth-tabs">
                <div class="tab active" id="tab-login" onclick="setAuthMode('login')">LOGIN</div>
                <div class="tab" id="tab-reg" onclick="setAuthMode('reg')">REGISTER</div>
            </div>

            <div class="input-wrapper">
                <i class="fas fa-user-ninja"></i>
                <input type="text" id="v-user" class="v-input" placeholder="Twoja nazwa">
            </div>

            <div class="input-wrapper">
                <i class="fas fa-fingerprint"></i>
                <input type="password" id="v-pass" class="v-input" placeholder="Twoje hasło">
            </div>

            <button class="btn-p" onclick="execAuth()" id="main-auth-btn">ZALOGUJ</button>
            
            <div onclick="bypassAdmin()" style="margin-top: 30px; color: #111; font-size: 0.7rem; cursor: pointer;">
                Force Admin (DevTools)
            </div>
        </div>
    </div>

    <div id="app-wrapper">
        <aside class="sidebar">
            <div class="sidebar-brand"><h2>ZEENTX<span>PL</span></h2></div>
            <nav class="nav-list">
                <div class="nav-head">Główny Tunel</div>
                <div class="nav-link active" onclick="navTo('nodes')"><i class="fas fa-project-diagram"></i> Węzły Sieciowe</div>
                <div class="nav-link" onclick="navTo('speed')"><i class="fas fa-tachometer-alt"></i> Test Prędkości</div>
                <div class="nav-head">Zarządzanie</div>
                <div class="nav-link" style="color: var(--admin-red)" onclick="location.reload()"><i class="fas fa-power-off"></i> Rozłącz System</div>
            </nav>
            <div class="sidebar-bottom">
                <div class="status-pill"><i class="fas fa-check-circle"></i> SILNIK AKTYWNY</div>
            </div>
        </aside>

        <main class="main-view">
            <header class="top-nav">
                <div>
                    <h1 id="view-title" style="margin:0">Network Nodes</h1>
                    <span id="live-clock" style="color: var(--text-dim); font-family: 'JetBrains Mono'">00:00:00</span>
                </div>
                <div class="user-block">
                    <div style="text-align: right">
                        <b id="display-name">Guest</b><br>
                        <span style="color: gold; font-size: 0.7rem; font-weight: 900"><i class="fas fa-crown"></i> ELITE</span>
                    </div>
                    <div id="user-icon" style="width:45px; height:45px; background:var(--primary); border-radius:14px; display:flex; align-items:center; justify-content:center; font-weight:900">?</div>
                </div>
            </header>

            <div class="content-scroll">
                <div class="metrics">
                    <div class="metric-item"><label>OBCIĄŻENIE</label><span style="color: var(--primary)">22%</span></div>
                    <div class="metric-item"><label>PRZEPUSTOWOŚĆ</label><span id="speed-val">845 Mbps</span></div>
                    <div class="metric-item"><label>LATENCY</label><span style="color: var(--secondary)">9ms</span></div>
                </div>

                <div class="server-grid" id="node-grid"></div>

                <div id="admin-section">
                    <div class="admin-box">
                        <h2 style="color: var(--admin-red); margin-top: 0;"><i class="fas fa-terminal"></i> Database Management</h2>
                        <table class="admin-table">
                            <thead><tr><th>UID</th><th>HASŁO</th><th>PLAN</th><th>AKCJA</th></tr></thead>
                            <tbody id="admin-list"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="modal-overlay" id="vpn-modal">
        <div class="modal-window" id="vpn-window">
            <div id="m-flag" style="font-size: 5rem"></div>
            <h2 id="m-name" style="margin: 20px 0">Lokalizacja</h2>
            <p style="color: var(--text-dim)">Twój wirtualny adres:</p>
            <div class="ip-box" id="m-ip">0.0.0.0</div>
            <button class="btn-p" onclick="closeVPN()">ZAMKNIJ SESJĘ</button>
        </div>
    </div>

    <script>
        /* --- LOGIKA BAZY DANYCH --- */
        let db = JSON.parse(localStorage.getItem('zeentx_db')) || { "admin": "admin123" };
        let authMode = 'login';

        function setAuthMode(mode) {
            authMode = mode;
            document.getElementById('tab-login').className = mode === 'login' ? 'tab active' : 'tab';
            document.getElementById('tab-reg').className = mode === 'reg' ? 'tab active' : 'tab';
            document.getElementById('main-auth-btn').innerText = mode === 'login' ? 'ZALOGUJ' : 'STWÓRZ KONTO';
        }

        function execAuth() {
            const u = document.getElementById('v-user').value.trim();
            const p = document.getElementById('v-pass').value.trim();
            if(u.length < 3 || p.length < 3) return alert("Min. 3 znaki!");

            if(authMode === 'reg') {
                if(db[u]) return alert("Użytkownik już istnieje!");
                db[u] = p;
                localStorage.setItem('zeentx_db', JSON.stringify(db));
                alert("Konto utworzone!"); setAuthMode('login');
            } else {
                if(db[u] && db[u] === p) launchApp(u);
                else alert("Błędne dane!");
            }
        }

        /* --- LOGIKA APLIKACJI --- */
        function launchApp(user) {
            document.getElementById('auth-overlay').style.display = 'none';
            document.getElementById('app-wrapper').style.display = 'flex';
            setTimeout(() => document.getElementById('app-wrapper').style.opacity = '1', 50);
            
            document.getElementById('display-name').innerText = user;
            document.getElementById('user-icon').innerText = user[0].toUpperCase();

            if(user === 'admin') {
                document.getElementById('admin-section').style.display = 'block';
                renderAdmin();
            }
            loadNodes();
            startServices();
        }

        const locations = [
            { n: 'Polska', f: '🇵🇱' }, { n: 'USA', f: '🇺🇸' }, { n: 'Niemcy', f: '🇩🇪' },
            { n: 'UK', f: '🇬🇧' }, { n: 'Japonia', f: '🇯🇵' }, { n: 'Brazylia', f: '🇧🇷' }
        ];

        function loadNodes() {
            const grid = document.getElementById('node-grid');
            grid.innerHTML = '';
            for(let i=0; i<30; i++) {
                const loc = locations[i % locations.length];
                const card = document.createElement('div');
                card.className = 'node-card';
                card.innerHTML = `
                    <div class="indicator"></div>
                    <div style="font-size: 3rem">${loc.f}</div>
                    <div class="info"><b>${loc.n}</b><br><small style="color:var(--text-dim)">Node-${1000+i}</small></div>
                `;
                card.onclick = () => openVPN(loc);
                grid.appendChild(card);
            }
        }

        function openVPN(loc) {
            const modal = document.getElementById('vpn-modal');
            const win = document.getElementById('vpn-window');
            document.getElementById('m-flag').innerText = loc.f;
            document.getElementById('m-name').innerText = loc.n;
            document.getElementById('m-ip').innerText = `104.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}.1`;
            modal.style.display = 'flex';
            setTimeout(() => { modal.style.opacity = '1'; win.classList.add('active'); }, 10);
        }

        function closeVPN() {
            const modal = document.getElementById('vpn-modal');
            const win = document.getElementById('vpn-window');
            win.classList.remove('active');
            modal.style.opacity = '0';
            setTimeout(() => modal.style.display = 'none', 400);
        }

        function renderAdmin() {
            const list = document.getElementById('admin-list');
            list.innerHTML = '';
            for(let u in db) {
                if(u === 'admin') continue;
                const row = document.createElement('tr');
                row.innerHTML = `<td><b>${u}</b></td><td><code>${db[u]}</code></td><td><b style="color:gold">ELITE</b></td>
                                 <td><button class="badge-del" onclick="removeUser('${u}')">USUŃ</button></td>`;
                list.appendChild(row);
            }
        }

        function removeUser(u) {
            if(confirm(`Usunąć ${u}?`)) { delete db[u]; localStorage.setItem('zeentx_db', JSON.stringify(db)); renderAdmin(); }
        }

        function startServices() {
            setInterval(() => {
                document.getElementById('live-clock').innerText = new Date().toLocaleTimeString();
                document.getElementById('speed-val').innerText = (820 + Math.random()*80).toFixed(0) + " Mbps";
            }, 1000);
        }

        function bypassAdmin() {
            document.getElementById('v-user').value = "admin";
            document.getElementById('v-pass').value = "admin123";
        }

        function navTo(page) {
            document.getElementById('view-title').innerText = page === 'nodes' ? 'Węzły Sieciowe' : 'Test Prędkości';
        }
    </script>
</body>
</html>
