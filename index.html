<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEENTX | VENTURA COPY-HUB</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&family=JetBrains+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent: #00f2ff;
            --accent-glow: rgba(0, 242, 255, 0.4);
            --bg: #050508;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --text: #ffffff;
            --ease: cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: var(--bg); color: var(--text); 
            font-family: 'Outfit', sans-serif; overflow: hidden; height: 100vh;
        }

        /* --- BACKGROUND --- */
        .glow-overlay {
            position: fixed; inset: 0;
            background: radial-gradient(circle at 20% 30%, rgba(0, 242, 255, 0.05) 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(112, 0, 255, 0.05) 0%, transparent 40%);
            z-index: -1;
        }

        /* --- ALERTY --- */
        #alert-container {
            position: fixed; top: 30px; right: 30px; z-index: 10000;
            display: flex; flex-direction: column; gap: 12px;
        }
        .alert {
            background: rgba(10, 10, 15, 0.95); border: 1px solid var(--border);
            border-left: 4px solid var(--accent); padding: 15px 25px; border-radius: 12px;
            backdrop-filter: blur(20px); transform: translateX(120%);
            transition: 0.5s var(--ease); box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        .alert.active { transform: translateX(0); }

        /* --- LOGIN / REGISTER SYSTEM --- */
        #auth-screen {
            position: fixed; inset: 0; z-index: 5000; background: var(--bg);
            display: flex; justify-content: center; align-items: center; transition: 1s var(--ease);
        }
        .auth-box {
            width: 420px; padding: 50px; background: var(--card-bg);
            border: 1px solid var(--border); border-radius: 40px; text-align: center;
            backdrop-filter: blur(30px);
        }
        .auth-tabs { display: flex; gap: 20px; justify-content: center; margin-bottom: 35px; }
        .tab { cursor: pointer; font-weight: 900; opacity: 0.3; transition: 0.3s; }
        .tab.active { opacity: 1; color: var(--accent); border-bottom: 2px solid var(--accent); }

        input {
            width: 100%; padding: 16px; margin: 10px 0; background: rgba(0,0,0,0.2);
            border: 1px solid var(--border); border-radius: 12px; color: white;
        }
        .btn-action {
            width: 100%; padding: 18px; background: var(--accent); border: none;
            border-radius: 15px; color: #000; font-weight: 900; cursor: pointer; margin-top: 20px;
        }

        /* --- MAIN APP LAYOUT --- */
        #app { display: grid; grid-template-columns: 280px 1fr 300px; height: 100vh; display: none; }

        /* Sidebar */
        .sidebar { border-right: 1px solid var(--border); padding: 40px 20px; }
        .nav-item {
            padding: 15px 20px; margin-bottom: 8px; border-radius: 15px; cursor: pointer;
            display: flex; align-items: center; gap: 15px; color: rgba(255,255,255,0.4);
            transition: 0.3s var(--ease);
        }
        .nav-item:hover {
            background: rgba(255,255,255,0.03); color: white;
            transform: translateX(10px) translateY(-5px);
            box-shadow: -10px 10px 20px rgba(0,0,0,0.2);
        }
        .nav-item.active { background: var(--accent); color: #000; font-weight: 900; }

        /* Main Content */
        .viewport { padding: 50px; overflow-y: auto; }
        .grid-100 { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }

        /* VENTURA MODULE CARD */
        .node-card {
            background: var(--card-bg); border: 1px solid var(--border);
            padding: 25px; border-radius: 25px; cursor: pointer;
            transition: 0.4s var(--ease); position: relative; overflow: hidden;
        }
        .node-card:hover {
            transform: translateY(-15px) scale(1.02);
            border-color: var(--accent);
            box-shadow: 0 30px 60px rgba(0,0,0,0.4), 0 0 20px var(--accent-glow);
        }
        .node-card .ip-tag {
            font-family: 'JetBrains Mono'; font-size: 0.75rem; color: var(--accent);
            background: rgba(0, 242, 255, 0.1); padding: 5px 10px; border-radius: 8px;
            display: inline-block; margin-top: 15px;
        }

        /* Right Social Bar */
        .social-bar { border-left: 1px solid var(--border); padding: 40px 20px; }
        .friend { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; opacity: 0.7; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #00ff88; }

    </style>
</head>
<body>

    <div class="glow-overlay"></div>
    <div id="alert-container"></div>

    <div id="auth-screen">
        <div class="auth-box">
            <div class="auth-tabs">
                <div class="tab active" onclick="toggleAuth('login')">ZALOGUJ</div>
                <div class="tab" onclick="toggleAuth('reg')">REJESTRACJA</div>
            </div>
            <div id="auth-inputs">
                <input type="text" id="u-name" placeholder="Twoja nazwa">
                <input type="password" placeholder="Klucz dostępu">
                <button class="btn-action" onclick="enterApp()">URUCHOM SYSTEM</button>
            </div>
        </div>
    </div>

    <div id="app">
        <aside class="sidebar">
            <h2 style="margin-bottom: 40px; letter-spacing: 2px;">ZEENTX<span style="color:var(--accent)">.</span></h2>
            <div class="nav-item active"><i class="fas fa-server"></i> Serwery (100)</div>
            <div class="nav-item"><i class="fab fa-discord"></i> Media / Discord</div>
            <div class="nav-item"><i class="fas fa-user-friends"></i> Znajomi</div>
            <div class="nav-item"><i class="fas fa-cog"></i> Ustawienia</div>
        </aside>

        <main class="viewport">
            <h1 style="font-size: 3rem; font-weight: 900; margin-bottom: 10px;">Wybierz <span style="color:var(--accent)">Węzeł</span></h1>
            <p style="color:gray; margin-bottom: 40px;">Kliknij w moduł, aby automatycznie skopiować IP do schowka.</p>
            
            <div class="grid-100" id="nodes-container">
                </div>
        </main>

        <aside class="social-bar">
            <div style="background: rgba(255,255,255,0.02); padding: 20px; border-radius: 20px; margin-bottom: 30px;">
                <b id="display-user">User</b><br>
                <small style="color:var(--accent)">STATUS: Aktywny</small>
            </div>
            <h4 style="color:gray; font-size: 0.7rem; text-transform: uppercase; margin-bottom: 20px;">Społeczność</h4>
            <div id="friends-list"></div>
        </aside>
    </div>

    <script>
        const countries = ["Poland", "USA", "Germany", "Japan", "France", "UK", "Sweden", "Canada", "Singapore", "Brazil"];

        // 1. Wejście do aplikacji
        function enterApp() {
            const name = document.getElementById('u-name').value || "Guest";
            document.getElementById('display-user').innerText = name;
            
            document.getElementById('auth-screen').style.opacity = '0';
            document.getElementById('auth-screen').style.transform = 'scale(1.1)';
            
            setTimeout(() => {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('app').style.display = 'grid';
                initNodes();
                initFriends();
                spawnAlert("System", "Witaj " + name + ". Moduły Ventura załadowane.");
            }, 600);
        }

        // 2. Generowanie 100 serwerów (Kopiowanie IP)
        function initNodes() {
            const container = document.getElementById('nodes-container');
            for(let i=1; i<=100; i++) {
                const country = countries[i % countries.length];
                const ip = `${Math.floor(Math.random()*254)+1}.${Math.floor(Math.random()*254)}.${Math.floor(Math.random()*254)}.${i}`;
                
                const card = document.createElement('div');
                card.className = 'node-card';
                card.innerHTML = `
                    <div style="font-size: 1.5rem; margin-bottom: 10px;">🌐</div>
                    <b style="display:block">${country} #${i}</b>
                    <small style="color:gray">Ping: ${Math.floor(Math.random()*40)+5}ms</small><br>
                    <div class="ip-tag">${ip}</div>
                `;
                
                // FUNKCJA KOPIOWANIA
                card.onclick = () => {
                    navigator.clipboard.writeText(ip);
                    spawnAlert("Schowek", "Skopiowano IP: " + ip);
                    
                    // Efekt wizualny kliknięcia
                    card.style.transform = 'scale(0.95)';
                    setTimeout(() => card.style.transform = '', 100);
                };
                
                container.appendChild(card);
            }
        }

        // 3. System Alertów
        function spawnAlert(title, msg) {
            const container = document.getElementById('alert-container');
            const alert = document.createElement('div');
            alert.className = 'alert';
            alert.innerHTML = `
                <b style="color:var(--accent); display:block; font-size:0.8rem; text-transform:uppercase;">${title}</b>
                <span style="font-size:0.9rem">${msg}</span>
            `;
            container.appendChild(alert);
            setTimeout(() => alert.classList.add('active'), 50);
            setTimeout(() => {
                alert.classList.remove('active');
                setTimeout(() => alert.remove(), 500);
            }, 3000);
        }

        // 4. Przełączanie Login/Reg (wizualne)
        function toggleAuth(mode) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            spawnAlert("Auth", "Tryb zmieniony na: " + mode.toUpperCase());
        }

        // 5. Inicjalizacja znajomych
        function initFriends() {
            const list = document.getElementById('friends-list');
            const names = ["Ventura_Owner", "X_Cyber", "Ghost", "Root_Admin"];
            names.forEach(n => {
                const f = document.createElement('div');
                f.className = 'friend';
                f.innerHTML = `<div class="dot"></div> <span>${n}</span>`;
                list.appendChild(f);
            });
        }
    </script>
</body>
</html>
