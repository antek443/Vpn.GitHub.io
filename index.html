<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEENTX OMNI-OS | index.html</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;600;900&family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #00fff2;
            --secondary: #7000ff;
            --bg-deep: #05050a;
            --glass: rgba(13, 13, 21, 0.85);
            --border: rgba(255, 255, 255, 0.1);
            --mario-red: #e52521;
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            height: 100vh; width: 100vw;
            overflow: hidden; font-family: 'Inter', sans-serif;
            background: var(--bg-deep); color: white;
        }

        /* --- SILNIK TAPET --- */
        #wallpaper-engine {
            position: fixed; inset: 0; z-index: -1;
            background-size: cover; background-position: center;
            transition: 1s all ease-in-out;
        }

        .wp-cyber { background-image: url('https://images.unsplash.com/photo-1614850523296-d8c1af93d400?q=80&w=2070'); filter: brightness(0.4); }
        .wp-mario { background-image: url('https://images.unsplash.com/photo-1550745165-9bc0b252726f?q=80&w=2070'); filter: brightness(0.8) sepia(0.3); }
        .wp-void { background: radial-gradient(circle, #1a1a1a, #000); }
        .wp-matrix { background-color: #000; background-image: linear-gradient(rgba(0, 255, 70, 0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 255, 70, 0.1) 1px, transparent 1px); background-size: 30px 30px; }

        /* --- TRYB MARIO --- */
        body.mario-active {
            font-family: 'Press Start 2P', cursive;
            --primary: #ffcc00;
        }
        body.mario-active .side-bar { background: var(--mario-red); border-right: 5px solid #000; }
        body.mario-active .node-card { border: 4px solid #000; background: #fff; color: #000; box-shadow: 8px 8px 0px #000; }
        body.mario-active .nav-item.active { background: #000; color: #fff; transform: scale(1.1); }

        /* --- STRUKTURA GUI --- */
        #app-shell {
            display: grid; grid-template-columns: 280px 1fr; height: 100vh;
            backdrop-filter: blur(10px);
        }

        .side-bar {
            background: var(--glass); border-right: 1px solid var(--border);
            padding: 40px 20px; display: flex; flex-direction: column;
        }

        .logo { font-family: 'Orbitron'; font-size: 1.5rem; text-align: center; margin-bottom: 50px; color: var(--primary); }

        .nav-menu { flex-grow: 1; }
        .nav-item {
            padding: 15px 20px; border-radius: 12px; cursor: pointer;
            display: flex; align-items: center; gap: 15px;
            transition: var(--transition); margin-bottom: 10px;
        }
        .nav-item:hover { background: rgba(255,255,255,0.1); }
        .nav-item.active { background: var(--primary); color: #000; font-weight: bold; }

        .main-content { overflow-y: auto; padding: 50px; }
        .view { display: none; animation: fadeIn 0.4s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Karty */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .node-card {
            background: var(--glass); border: 1px solid var(--border);
            padding: 25px; border-radius: 20px; transition: var(--transition); text-align: center;
        }
        .node-card:hover { transform: translateY(-5px); border-color: var(--primary); }

        /* Przełącznik Mario */
        .switch { width: 60px; height: 30px; position: relative; display: inline-block; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; inset: 0; background: #333; border-radius: 30px; cursor: pointer; transition: .4s; }
        .slider:before { position: absolute; content: ""; height: 22px; width: 22px; left: 4px; bottom: 4px; background: white; border-radius: 50%; transition: .4s; }
        input:checked + .slider { background: var(--mario-red); }
        input:checked + .slider:before { transform: translateX(30px); }

        .coin-box { font-size: 3rem; color: gold; animation: spin 1s infinite linear; margin-bottom: 20px; }
        @keyframes spin { from { transform: rotateY(0deg); } to { transform: rotateY(360deg); } }
    </style>
</head>
<body>

    <div id="wallpaper-engine" class="wp-cyber"></div>

    <div id="app-shell">
        <aside class="side-bar">
            <div class="logo"><i class="fas fa-terminal"></i> ZEENTX OS</div>
            <nav class="nav-menu">
                <div class="nav-item active" onclick="showV(this, 'dash')"><i class="fas fa-home"></i> Panel</div>
                <div class="nav-item" onclick="showV(this, 'vpn')"><i class="fas fa-globe"></i> Serwery VPN</div>
                <div class="nav-item" onclick="showV(this, 'wp')"><i class="fas fa-image"></i> Tapety</div>
                <div class="nav-item" onclick="showV(this, 'mario')"><i class="fas fa-gamepad"></i> Opcje Mario</div>
            </nav>
            <button onclick="location.reload()" style="padding: 10px; background: none; border: 1px solid gray; color: gray; border-radius: 10px; cursor: pointer;">Restart</button>
        </aside>

        <main class="main-content">
            <div id="v-dash" class="view active">
                <h1>Witaj w ZEENTX</h1>
                <p style="color: gray; margin-bottom: 30px;">System gotowy do pracy.</p>
                <div class="grid">
                    <div class="node-card"><h3>PING</h3><p id="ping">-- ms</p></div>
                    <div class="node-card"><h3>STATUS</h3><p style="color: var(--primary)">ZABEZPIECZONY</p></div>
                </div>
            </div>

            <div id="v-vpn" class="view">
                <h1>Wybierz Serwer</h1>
                <div class="grid">
                    <div class="node-card" onclick="alert('Łączenie...')"><h1>🇵🇱</h1><b>Polska</b></div>
                    <div class="node-card" onclick="alert('Łączenie...')"><h1>🇺🇸</h1><b>USA</b></div>
                    <div class="node-card" onclick="alert('Łączenie...')"><h1>🇯🇵</h1><b>Japonia</b></div>
                </div>
            </div>

            <div id="v-wp" class="view">
                <h1>Zmień Tapetę</h1>
                <div class="grid">
                    <div class="node-card" onclick="setW('cyber')"><b>Neon City</b></div>
                    <div class="node-card" onclick="setW('matrix')"><b>Matrix</b></div>
                    <div class="node-card" onclick="setW('void')"><b>Dark Void</b></div>
                </div>
            </div>

            <div id="v-mario" class="view">
                <div class="node-card" style="max-width: 500px; margin: 0 auto;">
                    <div class="coin-box"><i class="fas fa-coins"></i></div>
                    <h2>MARIO MOD</h2>
                    <p style="margin: 20px 0;">Włącz tryb retro, aby zmienić wygląd całego systemu!</p>
                    <label class="switch">
                        <input type="checkbox" id="mtoggle" onchange="toggleM()">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
        </main>
    </div>

    <script>
        function showV(el, id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('v-' + id).classList.add('active');
            el.classList.add('active');
        }

        function setW(type) {
            document.getElementById('wallpaper-engine').className = 'wp-' + type;
        }

        function toggleM() {
            const on = document.getElementById('mtoggle').checked;
            if(on) {
                document.body.classList.add('mario-active');
                setW('mario');
            } else {
                document.body.classList.remove('mario-active');
                setW('cyber');
            }
        }

        setInterval(() => {
            document.getElementById('ping').innerText = Math.floor(Math.random() * 30 + 5) + " ms";
        }, 2000);
    </script>
</body>
</html>
