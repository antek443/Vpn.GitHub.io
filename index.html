<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZeentxPL VPN | Cyber-Gen 2026</title>

    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --accent: #ff00c1;
            --bg: #050508;
            --glass: rgba(15, 15, 25, 0.8);
        }

        body {
            margin: 0;
            padding: 20px;
            font-family: 'Orbitron', sans-serif; /* Futurystyczna czcionka */
            background-color: var(--bg);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Tło z siatką 3D */
        .bg-grid {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            perspective: 500px;
            z-index: -1;
            transform: rotateX(60deg);
            transform-origin: top;
            animation: gridMove 10s linear infinite;
        }

        @keyframes gridMove {
            from { background-position: 0 0; }
            to { background-position: 0 50px; }
        }

        h1 {
            font-size: 3.5rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            background: linear-gradient(to bottom, #fff 30%, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 40px;
            filter: drop-shadow(0 0 15px var(--primary));
        }

        .main-container {
            width: 100%;
            max-width: 1100px;
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
        }

        .box {
            background: var(--glass);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 25px;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
        }

        /* Efekt podnoszenia z poświatą */
        .box:hover {
            transform: translateY(-15px) rotateX(2deg);
            border-color: var(--primary);
            box-shadow: 0 20px 50px rgba(0, 242, 255, 0.2);
        }

        /* Przyciski krajów - Styl High-Tech */
        .country-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            text-align: center;
            position: relative;
            transition: 0.2s;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 0; height: 0;
            background: var(--primary);
            opacity: 0.3;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.4s, height 0.4s;
        }

        .card:active::before {
            width: 300px;
            height: 300px;
            opacity: 0;
        }

        .card:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--primary);
            transform: scale(1.05);
            box-shadow: 0 0 15px var(--primary);
        }

        /* Status Bar */
        .status-bar {
            height: 4px;
            width: 100%;
            background: #222;
            margin: 15px 0;
            border-radius: 2px;
            overflow: hidden;
        }

        .status-progress {
            height: 100%;
            width: 0%;
            background: var(--primary);
            box-shadow: 0 0 10px var(--primary);
        }

        /* Powiadomienie (Toast) */
        #toast {
            position: fixed;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--primary);
            color: black;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: bold;
            transition: 0.5s;
            z-index: 1000;
            box-shadow: 0 0 30px var(--primary);
        }

        .shake { animation: shake 0.3s ease-in-out; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .ip-box {
            font-size: 1.5rem;
            color: var(--primary);
            text-shadow: 0 0 10px var(--primary);
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 5px;
            border-left: 3px solid var(--primary);
        }

    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="bg-grid"></div>
    <div id="toast">SYSTEM: IP COPIED TO CLIPBOARD</div>

    <h1>ZeentxPL // VPN</h1>

    <div class="main-container">
        <div class="box">
            <h2 style="color: var(--primary)">DASHBOARD</h2>
            <p>Real-Time Tracking</p>
            <div class="ip-box" id="real-ip">0.0.0.0</div>
            <br>
            <button onclick="fetchIP()" style="width:100%; padding:15px; background:var(--primary); border:none; font-family:'Orbitron'; cursor:pointer; font-weight:bold;">INITIALIZE SCAN</button>
            <hr style="opacity:0.1; margin:20px 0;">
            <div id="connection-status">STATUS: DISCONNECTED</div>
            <div class="status-bar"><div class="status-progress" id="progress"></div></div>
        </div>

        <div class="box">
            <h2 style="color: var(--accent)">NETWORK NODES</h2>
            <div class="country-grid" id="grid"></div>
        </div>
    </div>

    <script>
        const nodes = [
            {n: 'POLAND', f: '🇵🇱'}, {n: 'USA', f: '🇺🇸'}, {n: 'GERMANY', f: '🇩🇪'}, {n: 'JAPAN', f: '🇯🇵'},
            {n: 'UK', f: '🇬🇧'}, {n: 'CANADA', f: '🇨🇦'}, {n: 'BRAZIL', f: '🇧🇷'}, {n: 'FRANCE', f: '🇫🇷'},
            {n: 'KOREA', f: '🇰🇷'}, {n: 'RUSSIA', f: '🇷🇺'}, {n: 'CHINA', f: '🇨🇳'}, {n: 'SWEDEN', f: '🇸🇪'},
            {n: 'NORWAY', f: '🇳🇴'}, {n: 'ITALY', f: '🇮🇹'}, {n: 'SPAIN', f: '🇪🇸'}, {n: 'DUBAI', f: '🇦🇪'},
            {n: 'MEXICO', f: '🇲🇽'}, {n: 'INDIA', f: '🇮🇳'}, {n: 'AUSTRALIA', f: '🇦🇺'}, {n: 'EGYPT', f: '🇪🇬'}
        ];

        const grid = document.getElementById('grid');
        nodes.forEach(node => {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `<span style="font-size:2rem">${node.f}</span><br><small>${node.n}</small>`;
            div.onclick = (e) => connect(node.n, div);
            grid.appendChild(div);
        });

        function fetchIP() {
            const el = document.getElementById('real-ip');
            el.innerText = "SCANNING...";
            fetch('https://api.ipify.org?format=json')
                .then(r => r.json())
                .then(d => el.innerText = d.ip)
                .catch(() => el.innerText = "ERROR");
        }

        function connect(name, element) {
            // Animacja paska
            const progress = document.getElementById('progress');
            const status = document.getElementById('connection-status');
            const fakeIP = `${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}.0.${Math.floor(Math.random()*255)}`;
            
            status.innerText = `CONNECTING TO: ${name}...`;
            progress.style.transition = "none";
            progress.style.width = "0%";
            
            // Efekt wstrząsu boku
            element.closest('.box').classList.add('shake');
            setTimeout(() => element.closest('.box').classList.remove('shake'), 300);

            setTimeout(() => {
                progress.style.transition = "width 0.8s ease-in";
                progress.style.width = "100%";
                
                setTimeout(() => {
                    status.innerText = `STABLE: ${name} (${fakeIP})`;
                    navigator.clipboard.writeText(fakeIP);
                    showToast(`NODE ${name} ACTIVE: ${fakeIP}`);
                }, 850);
            }, 50);
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.top = "20px";
            setTimeout(() => t.style.top = "-100px", 3000);
        }
    </script>
</body>
</html>
