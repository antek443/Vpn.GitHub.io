<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEENTX | OMNI HUB</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent: #00ffcc;
            --bg: #0a0a0c;
            --card: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: var(--bg); color: white; 
            font-family: 'Outfit', sans-serif; overflow: hidden; height: 100vh;
        }

        /* --- TŁO --- */
        .glow {
            position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(circle at 50% 0%, #004433 0%, transparent 70%);
        }

        /* --- LOGIN --- */
        #login {
            position: fixed; inset: 0; z-index: 9999; background: var(--bg);
            display: flex; justify-content: center; align-items: center; transition: 0.8s ease-in-out;
        }
        .login-box {
            width: 380px; padding: 50px; background: var(--card);
            border: 1px solid var(--border); border-radius: 30px; text-align: center; backdrop-filter: blur(20px);
        }
        input {
            width: 100%; padding: 15px; margin: 15px 0; background: rgba(0,0,0,0.5);
            border: 1px solid var(--border); border-radius: 12px; color: white; text-align: center;
        }
        .btn-go {
            width: 100%; padding: 15px; background: var(--accent); color: black;
            border: none; border-radius: 12px; font-weight: 900; cursor: pointer;
        }

        /* --- LAYOUT --- */
        #app { display: none; grid-template-columns: 260px 1fr; height: 100vh; }
        
        .side { border-right: 1px solid var(--border); padding: 40px 20px; background: rgba(0,0,0,0.3); }
        .nav { padding: 15px; border-radius: 12px; cursor: pointer; color: gray; transition: 0.3s; margin-bottom: 5px; }
        .nav:hover, .nav.active { background: var(--card); color: var(--accent); }

        .main { padding: 40px; overflow-y: auto; }

        /* GRID ONLINE (10) */
        .online-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; margin-bottom: 40px; }
        .game-top {
            height: 120px; border: 1px solid var(--accent); border-radius: 20px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: rgba(0, 255, 204, 0.05);
        }
        .game-top:hover { transform: translateY(-10px); background: var(--accent); color: black; box-shadow: 0 0 30px rgba(0,255,204,0.4); }

        /* GRID MINI (50) */
        .mini-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        .mini-box {
            background: var(--card); border: 1px solid var(--border);
            padding: 20px; border-radius: 20px; cursor: pointer; text-align: center;
            transition: 0.3s;
        }
        .mini-box:hover { transform: scale(1.05); border-color: var(--accent); background: rgba(255,255,255,0.05); }

        /* --- OKNO GRY (DYNAMICZNE) --- */
        #game-view {
            position: fixed; inset: 0; z-index: 10000; background: #000;
            display: none; flex-direction: column;
        }
        .game-header { padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; background: #111; }
        #game-frame { width: 100%; height: 100%; border: none; display: none; }
        
        /* Loader animowany */
        .loader-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .loading-bar { width: 200px; height: 4px; background: #222; border-radius: 2px; margin-top: 20px; overflow: hidden; }
        .loading-progress { width: 0%; height: 100%; background: var(--accent); transition: 2s linear; }

    </style>
</head>
<body>

    <div class="glow"></div>

    <div id="login">
        <div class="login-box">
            <h2 style="margin-bottom: 10px;">ZEENTX<span style="color:var(--accent)">.HUB</span></h2>
            <input type="text" id="nick" placeholder="Podaj swój Nick">
            <button class="btn-go" onclick="start()">WEJDŹ DO SYSTEMU</button>
        </div>
    </div>

    <div id="game-view">
        <div class="game-header">
            <span id="game-title" style="font-weight: 900; color: var(--accent);">GRA</span>
            <button onclick="closeGame()" style="background:red; color:white; border:none; padding: 8px 20px; border-radius: 8px; cursor:pointer; font-weight:900;">ZAMKNIJ X</button>
        </div>
        <div class="loader-wrap" id="loader">
            <h2 id="load-text">URUCHAMIANIE...</h2>
            <div class="loading-bar"><div class="loading-progress" id="p-bar"></div></div>
        </div>
        <iframe id="game-frame" src=""></iframe>
    </div>

    <div id="app">
        <aside class="side">
            <h1 style="font-size: 1.2rem; margin-bottom: 40px;">OMNI ENGINE</h1>
            <div class="nav active"><i class="fas fa-home"></i> Dashboard</div>
            <div class="nav"><i class="fas fa-gamepad"></i> Gry (50)</div>
            <div class="nav"><i class="fas fa-globe"></i> Online (10)</div>
            <div class="nav"><i class="fab fa-discord"></i> Discord</div>
        </aside>

        <main class="main">
            <h2 style="margin-bottom: 20px;">TOP 10 <span style="color:var(--accent)">ONLINE</span></h2>
            <div class="online-grid">
                <div class="game-top" onclick="play('World Craft', 'https://www.retrogames.cc/embed/41724-super-mario-world-usa.html')"><i class="fas fa-cube"></i><b>World</b></div>
                <div class="game-top" onclick="play('Scrabble', 'https://poki.com/pl/g/scrabble-sprint')"><i class="fas fa-font"></i><b>Scrabble</b></div>
                <div class="game-top" onclick="play('Snake', 'https://poki.com/pl/g/snake-is-mlg')"><i class="fas fa-snake"></i><b>Snake.io</b></div>
                <div class="game-top" onclick="play('Tetris', 'https://poki.com/pl/g/tetris')"><i class="fas fa-th-large"></i><b>Tetris</b></div>
                <div class="game-top" onclick="play('Chess', 'https://poki.com/pl/g/master-chess')"><i class="fas fa-chess"></i><b>Chess</b></div>
                <div class="game-top" onclick="play('Tank', 'https://poki.com/pl/g/tank-trouble')"><i class="fas fa-shield-alt"></i><b>Tank</b></div>
                <div class="game-top" onclick="play('Drift', 'https://poki.com/pl/g/drift-hunters')"><i class="fas fa-car"></i><b>Drift</b></div>
                <div class="game-top" onclick="play('Sniper', 'https://poki.com/pl/g/rooftop-snipers')"><i class="fas fa-crosshairs"></i><b>Sniper</b></div>
                <div class="game-top" onclick="play('Duel', 'https://poki.com/pl/g/thumb-fighter')"><i class="fas fa-hand-rock"></i><b>Duel</b></div>
                <div class="game-top" onclick="play('Soccer', 'https://poki.com/pl/g/football-legends')"><i class="fas fa-futbol"></i><b>Soccer</b></div>
            </div>

            <h2 style="margin-bottom: 20px;">MINI GRY <span style="color:var(--accent)">(50)</span></h2>
            <div class="mini-grid" id="mini-container"></div>
        </main>
    </div>

    <script>
        function start() {
            const n = document.getElementById('nick').value;
            if(!n) return alert("Podaj nick!");
            document.getElementById('login').style.transform = 'translateY(-100%)';
            setTimeout(() => {
                document.getElementById('app').style.display = 'grid';
                genMini();
            }, 600);
        }

        function genMini() {
            const container = document.getElementById('mini-container');
            for(let i=1; i<=50; i++) {
                const div = document.createElement('div');
                div.className = 'mini-box';
                div.innerHTML = `<i class="fas fa-ghost"></i><br><b>Gra #${i}</b>`;
                div.onclick = () => play('Mini Gra #'+i, 'https://poki.com/pl/g/retro-bowl');
                container.appendChild(div);
            }
        }

        function play(title, url) {
            const view = document.getElementById('game-view');
            const frame = document.getElementById('game-frame');
            const bar = document.getElementById('p-bar');
            const loader = document.getElementById('loader');

            view.style.display = 'flex';
            document.getElementById('game-title').innerText = title.toUpperCase();
            
            // Reset ładowania
            frame.style.display = 'none';
            loader.style.display = 'flex';
            bar.style.width = '0%';
            
            setTimeout(() => {
                bar.style.width = '100%';
            }, 100);

            // Po 2 sekundach pokazujemy grę
            setTimeout(() => {
                loader.style.display = 'none';
                frame.style.display = 'block';
                frame.src = url;
            }, 2100);
        }

        function closeGame() {
            document.getElementById('game-view').style.display = 'none';
            document.getElementById('game-frame').src = "";
        }
    </script>
</body>
</html>
